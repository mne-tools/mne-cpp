  GenerateWinStaticBinaries:
    runs-on: windows-2025

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install ninja
      run: |
        choco install ninja
    - name: Compile static Qt version
      run: |
        # Clone Qt6 repo
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        # Create shadow build folder
        mkdir qt6_shadow
        cd qt6_shadow
        # Setup the compiler 
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        # Configure Qt6 (use -init-submodules instead of init-repository which requires /bin/sh)
        ..\qt5\configure.bat -init-submodules -submodules qtbase,qtsvg,qtshadertools -release -static -no-openssl -no-pch -optimize-size -opengl desktop -platform win32-msvc -prefix "..\Qt6_binaries" -skip webengine -nomake tests -nomake examples -opensource -confirm-license
        cmake --build . --parallel $env:NUMBER_OF_PROCESSORS
        cmake --install .
    - name: Package binaries
      run: |
        cd ..\Qt6_binaries
        7z a ..\mne-cpp\qt6_6110_static_binaries_win.zip .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_6110_static_binaries_win.zip
        path: qt6_6110_static_binaries_win.zip
    - name: Upload to qt_binaries release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt6_6110_static_binaries_win.zip --clobber

  GenerateWasmBinaries:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Setup emscripten compiler 
      run: |
        cd ..
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk
        git pull
        ./emsdk install 4.0.7
        ./emsdk activate 4.0.7
    - name: Install dependencies
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q build-essential libgl1-mesa-dev libvulkan-dev ninja-build
    - name: Build host Qt (needed for cross-compilation)
      run: |
        cd ..
        # Clone Qt6 repo
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        cd qt5
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools
        # Build minimal host Qt
        cd ..
        mkdir qt6_host_build
        cd qt6_host_build
        ../qt5/configure -release -prefix "$PWD/../Qt6_host" -skip webengine -nomake tests -nomake examples -no-dbus -no-openssl -no-pch -opensource -confirm-license -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Compile wasm Qt version
      run: |
        cd ..
        source ./emsdk/emsdk_env.sh
        # Create shadow build folder
        mkdir qt6_shadow
        cd qt6_shadow
        # Configure Qt6 for wasm (use the host Qt we just built)
        ../qt5/configure -qt-host-path "$PWD/../Qt6_host" -xplatform wasm-emscripten -feature-thread -skip webengine -nomake tests -nomake examples -no-dbus -no-openssl -no-pch -opensource -confirm-license -prefix "$PWD/../Qt6_binaries" -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Package binaries
      run: |
        tar cfvz qt6_6110_static_binaries_wasm.tar.gz -C ../Qt6_binaries .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_6110_static_binaries_wasm.tar.gz
        path: qt6_6110_static_binaries_wasm.tar.gz
    - name: Upload to qt_binaries release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt6_6110_static_binaries_wasm.tar.gz --clobber
