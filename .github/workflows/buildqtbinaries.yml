name: BuildQtBinaries

on:
  workflow_dispatch:
  push:
    branches:
    # Change this to the branch name which you are developing on to trigger the workflow
    - generateqt

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  QT_BINARY_RELEASE_TAG: qt_binaries
  QT_MIN_VERSION: '6.10.0'
  QT_MAX_VERSION: '6.11.0'
  QIF_VERSION: '4.7'
  QIF_TOOL_ID: 'qt.tools.ifw.47'

jobs:
  GenerateLinuxDynamicBinaries:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: '6.10.0'
            version_token: '6100'
          - qt_version: '6.11.0'
            version_token: '6110'

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        modules: qtshadertools qttools
    - name: Package binaries
      shell: bash
      run: |
        tar cfvz "qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz" -C "$RUNNER_WORKSPACE/Qt/${{ matrix.qt_version }}/gcc_64" .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz
        path: qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz
    - name: Create toolchain release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>/dev/null || true
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz" --clobber

  GenerateMacOSDynamicBinaries:
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: '6.10.0'
            version_token: '6100'
          - qt_version: '6.11.0'
            version_token: '6110'

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'arm64'
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        modules: qtshadertools qttools
    - name: Package binaries
      shell: bash
      run: |
        tar cfvz "qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz" -C "$RUNNER_WORKSPACE/Qt/${{ matrix.qt_version }}/macos" .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz
        path: qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz
    - name: Create toolchain release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>/dev/null || true
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz" --clobber

  GenerateWinDynamicBinaries:
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: '6.10.0'
            version_token: '6100'
            source_build: false
          - qt_version: '6.11.0'
            version_token: '6110'
            source_build: true

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install Qt (pre-built)
      if: ${{ !matrix.source_build }}
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        arch: win64_msvc2022_64
        modules: qtshadertools qttools
    - name: Install ninja
      if: ${{ matrix.source_build }}
      run: |
        choco install ninja
    - name: Compile dynamic Qt version from source
      if: ${{ matrix.source_build }}
      run: |
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v${{ matrix.qt_version }}
        mkdir qt6_shadow
        cd qt6_shadow
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        ..\qt5\configure.bat -init-submodules -submodules qtbase,qtsvg,qtshadertools,qttools -release -no-pch -optimize-size -opengl desktop -platform win32-msvc -prefix "..\Qt6_binaries" -skip webengine -nomake tests -nomake examples -opensource -confirm-license
        cmake --build . --parallel $env:NUMBER_OF_PROCESSORS
        cmake --install .
    - name: Package binaries
      run: |
        if ('${{ matrix.source_build }}' -eq 'true') {
          $qtDir = (Resolve-Path "$env:GITHUB_WORKSPACE\..\Qt6_binaries").Path
        } else {
          $qtDir = "$env:RUNNER_WORKSPACE\Qt\${{ matrix.qt_version }}\msvc2022_64"
        }
        Push-Location $qtDir
        7z a "$env:GITHUB_WORKSPACE\qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip" .
        Pop-Location
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip
        path: qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>$null
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip" --clobber

  GenerateLinuxInstallerFramework:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Download Qt Installer Framework
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        aqt install-tool linux desktop tools_ifw ${{ env.QIF_TOOL_ID }} --outputdir "$RUNNER_TOOL_CACHE/Qt"
    - name: Package binaries
      run: |
        tar cfvz "qt_ifw_47_linux.tar.gz" -C "$RUNNER_TOOL_CACHE/Qt/Tools/QtInstallerFramework/${{ env.QIF_VERSION }}" .
    - uses: actions/upload-artifact@v7
      with:
        name: qt_ifw_47_linux.tar.gz
        path: qt_ifw_47_linux.tar.gz
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>/dev/null || true
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt_ifw_47_linux.tar.gz --clobber

  GenerateMacOSInstallerFramework:
    runs-on: macos-26

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'arm64'
    - name: Download Qt Installer Framework
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        aqt install-tool mac desktop tools_ifw ${{ env.QIF_TOOL_ID }} --outputdir "$RUNNER_TOOL_CACHE/Qt"
    - name: Package binaries
      run: |
        tar cfvz "qt_ifw_47_macos.tar.gz" -C "$RUNNER_TOOL_CACHE/Qt/Tools/QtInstallerFramework/${{ env.QIF_VERSION }}" .
    - uses: actions/upload-artifact@v7
      with:
        name: qt_ifw_47_macos.tar.gz
        path: qt_ifw_47_macos.tar.gz
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>/dev/null || true
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt_ifw_47_macos.tar.gz --clobber

  GenerateWinInstallerFramework:
    runs-on: windows-2025

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Download Qt Installer Framework
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        aqt install-tool windows desktop tools_ifw ${{ env.QIF_TOOL_ID }} --outputdir "$env:RUNNER_TOOL_CACHE\Qt"
    - name: Package binaries
      run: |
        Push-Location "$env:RUNNER_TOOL_CACHE\Qt\Tools\QtInstallerFramework\${{ env.QIF_VERSION }}"
        7z a "$env:GITHUB_WORKSPACE\qt_ifw_47_win.zip" .
        Pop-Location
    - uses: actions/upload-artifact@v7
      with:
        name: qt_ifw_47_win.zip
        path: qt_ifw_47_win.zip
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>$null
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt_ifw_47_win.zip --clobber

  GenerateLinuxStaticBinaries:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -q build-essential libgl1-mesa-dev libvulkan-dev ninja-build
    - name: Compile static Qt version
      run: |
        # Clone Qt6 repo
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        cd qt5
        ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools
        # Create shadow build folder
        cd ..
        mkdir qt6_shadow
        cd qt6_shadow
        # Configure Qt6
        ../qt5/configure -static -release -prefix "../Qt6_binaries" -skip webengine -nomake tests -nomake examples -no-dbus -no-ssl -no-pch -opensource -confirm-license -qt-libpng -qt-pcre -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Package binaries
      run: |
        tar cfvz qt6_6110_static_binaries_linux.tar.gz -C ../Qt6_binaries .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_6110_static_binaries_linux.tar.gz
        path: qt6_6110_static_binaries_linux.tar.gz
    - name: Create qt_binaries release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>/dev/null || true
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt6_6110_static_binaries_linux.tar.gz --clobber

  GenerateMacOSStaticBinaries:
    runs-on: macos-26
    
    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install dependencies
      run: |
        brew list ninja >/dev/null 2>&1 || brew install ninja
    - name: Compile static Qt version
      run: |
        # Clone Qt6 repo
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        cd qt5
        ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools
        # Create shadow build folder
        cd ..
        mkdir qt6_shadow
        cd qt6_shadow
        # Configure Qt6
        ../qt5/configure -static -release -prefix "../Qt6_binaries" -skip webengine -nomake tests -nomake examples -no-dbus -no-ssl -no-pch -opensource -confirm-license -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(sysctl -n hw.ncpu)
        cmake --install .
    - name: Package binaries
      run: |
        tar cfvz qt6_6110_static_binaries_macos.tar.gz -C ../Qt6_binaries .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_6110_static_binaries_macos.tar.gz
        path: qt6_6110_static_binaries_macos.tar.gz
    - name: Upload to qt_binaries release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>/dev/null || true
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt6_6110_static_binaries_macos.tar.gz --clobber

  GenerateWinStaticBinaries:
    runs-on: windows-2025

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install ninja
      run: |
        choco install ninja
    - name: Compile static Qt version
      run: |
        # Clone Qt6 repo
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        # Create shadow build folder
        mkdir qt6_shadow
        cd qt6_shadow
        # Setup the compiler 
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        # Configure Qt6 (use -init-submodules instead of init-repository which requires /bin/sh)
        ..\qt5\configure.bat -init-submodules -submodules qtbase,qtsvg,qtshadertools -release -static -no-pch -optimize-size -opengl desktop -platform win32-msvc -prefix "..\Qt6_binaries" -skip webengine -nomake tests -nomake examples -opensource -confirm-license
        cmake --build . --parallel $env:NUMBER_OF_PROCESSORS
        cmake --install .
    - name: Package binaries
      run: |
        cd ..\Qt6_binaries
        7z a ..\mne-cpp\qt6_6110_static_binaries_win.zip .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_6110_static_binaries_win.zip
        path: qt6_6110_static_binaries_win.zip
    - name: Upload to qt_binaries release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>$null
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt6_6110_static_binaries_win.zip --clobber

  GenerateWasmBinaries:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Setup emscripten compiler 
      run: |
        cd ..
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk
        git pull
        ./emsdk install 4.0.7
        ./emsdk activate 4.0.7
    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -q build-essential libgl1-mesa-dev libvulkan-dev ninja-build
    - name: Build host Qt (needed for cross-compilation)
      run: |
        cd ..
        # Clone Qt6 repo
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        cd qt5
        ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools
        # Build minimal host Qt
        cd ..
        mkdir qt6_host_build
        cd qt6_host_build
        ../qt5/configure -release -prefix "$PWD/../Qt6_host" -skip webengine -nomake tests -nomake examples -no-dbus -no-ssl -no-pch -opensource -confirm-license -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Compile wasm Qt version
      run: |
        cd ..
        source ./emsdk/emsdk_env.sh
        # Create shadow build folder
        mkdir qt6_shadow
        cd qt6_shadow
        # Configure Qt6 for wasm (use the host Qt we just built)
        ../qt5/configure -qt-host-path "$PWD/../Qt6_host" -xplatform wasm-emscripten -feature-thread -skip webengine -nomake tests -nomake examples -no-dbus -no-ssl -no-pch -opensource -confirm-license -prefix "$PWD/../Qt6_binaries" -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Package binaries
      run: |
        tar cfvz qt6_6110_static_binaries_wasm.tar.gz -C ../Qt6_binaries .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_6110_static_binaries_wasm.tar.gz
        path: qt6_6110_static_binaries_wasm.tar.gz
    - name: Upload to qt_binaries release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ env.QT_BINARY_RELEASE_TAG }}" --title "Qt Toolchain Artifacts" --notes "Reusable Qt runtime, static, WASM and Installer Framework assets for CI." 2>/dev/null || true
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt6_6110_static_binaries_wasm.tar.gz --clobber
