name: BuildQtBinaries

on:
  workflow_dispatch:
  push:
    branches:
    # Change this to the branch name which you are developing on to trigger the workflow
    - generateqt

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  QT_BINARY_RELEASE_TAG: qt_binaries
  QT_BINARY_RELEASE_TITLE: Qt Toolchain Artifacts
  QT_BINARY_RELEASE_NOTES: Reusable Qt runtime, static, WASM and Installer Framework assets for CI.
  QT_MIN_VERSION: '6.10.0'
  QT_MAX_VERSION: '6.11.0'
  QIF_VERSION: '4.11.0'
  QIF_VERSION_TOKEN: '4110'
  QIF_QT_VERSION: '6.9.1'

jobs:
  GenerateLinuxDynamicBinaries:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: '6.10.0'
            version_token: '6100'
          - qt_version: '6.11.0'
            version_token: '6110'

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install dependencies
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q build-essential libgl1-mesa-dev libvulkan-dev ninja-build
    - name: Compile dynamic Qt version
      run: |
        cd ..
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 git clone https://code.qt.io/qt/qt5.git -b v${{ matrix.qt_version }}
        cd qt5
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools,qttools
        cd ..
        mkdir qt6_shadow
        cd qt6_shadow
        # Add -opengl desktop to ensure OpenGL/WrapOpenGL CMake config is generated
        ../qt5/configure -release -prefix "../Qt6_binaries" -skip webengine -nomake tests -nomake examples -no-dbus -no-openssl -no-pch -opengl desktop -opensource -confirm-license -qt-libpng -qt-pcre -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Package binaries
      shell: bash
      run: |
        tar cfvz "qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz" -C ../Qt6_binaries .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz
        path: qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz
    - name: Create toolchain release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt6_${{ matrix.version_token }}_dynamic_binaries_linux.tar.gz" --clobber

  GenerateMacOSDynamicBinaries:
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: '6.10.0'
            version_token: '6100'
          - qt_version: '6.11.0'
            version_token: '6110'

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'arm64'
    - name: Install dependencies
      run: |
        brew list ninja >/dev/null 2>&1 || brew install ninja
    - name: Compile dynamic Qt version
      run: |
        cd ..
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 git clone https://code.qt.io/qt/qt5.git -b v${{ matrix.qt_version }}
        cd qt5
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools,qttools
        cd ..
        mkdir qt6_shadow
        cd qt6_shadow
        ../qt5/configure -release -prefix "../Qt6_binaries" -skip webengine -nomake tests -nomake examples -no-dbus -no-openssl -no-pch -opensource -confirm-license -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(sysctl -n hw.ncpu)
        cmake --install .
    - name: Package binaries
      shell: bash
      run: |
        tar cfvz "qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz" -C ../Qt6_binaries .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz
        path: qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz
    - name: Create toolchain release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt6_${{ matrix.version_token }}_dynamic_binaries_macos.tar.gz" --clobber

  GenerateWinDynamicBinaries:
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: '6.10.0'
            version_token: '6100'
          - qt_version: '6.11.0'
            version_token: '6110'

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install ninja
      run: |
        choco install ninja
    - name: Compile dynamic Qt version from source
      run: |
        cd ..
        $workRoot = (Get-Location).Path
        git clone https://code.qt.io/qt/qt5.git -b v${{ matrix.qt_version }}
        $applyQt611QtToolsPatch = '${{ matrix.qt_version }}' -eq '6.11.0'
        if ($applyQt611QtToolsPatch) {
          # Temporary Qt 6.11 Windows workaround:
          # qhelpenginecore.cpp uses QtConcurrent, but the Help target omits Qt::Concurrent.
          # Remove this block once the next Qt release no longer needs the patch.
          # qttools/assistant also needs its nested qlitehtml submodule on 6.11.
          git -C qt5 submodule update --init --recursive --depth 1 qtrepotools qtbase qtsvg qtshadertools qtimageformats qtlanguageserver qtdeclarative qtactiveqt qttools
          $helpCmake = Join-Path $workRoot 'qt5\qttools\src\assistant\help\CMakeLists.txt'
          $helpCmakeLines = [System.Collections.Generic.List[string]]::new()
          $helpCmakeLines.AddRange([string[]](Get-Content $helpCmake))
          if (-not ($helpCmakeLines -contains '        Qt::Concurrent')) {
            $coreLineIndex = $helpCmakeLines.IndexOf('        Qt::Core')
            if ($coreLineIndex -lt 0) {
              throw 'Could not locate Qt::Core entry in qttools/src/assistant/help/CMakeLists.txt.'
            }
            $helpCmakeLines.Insert($coreLineIndex + 1, '        Qt::Concurrent')
            Set-Content -Path $helpCmake -Value $helpCmakeLines
          }
        }
        mkdir qt6_shadow
        cd qt6_shadow
        $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        if (-not $vsInstallPath) {
          throw 'Could not locate a Visual Studio installation with VC tools.'
        }
        $vcvarsPath = Join-Path $vsInstallPath 'VC\Auxiliary\Build\vcvars64.bat'
        cmd.exe /c "call `"$vcvarsPath`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        $configureArgs = @(
          '-submodules', 'qtbase,qtsvg,qtshadertools,qttools',
          '-release',
          '-no-openssl',
          '-no-pch',
          '-optimize-size',
          '-opengl', 'desktop',
          '-platform', 'win32-msvc',
          '-prefix', '..\Qt6_binaries',
          '-skip', 'webengine',
          '-nomake', 'tests',
          '-nomake', 'examples',
          '-opensource',
          '-confirm-license'
        )
        if (-not $applyQt611QtToolsPatch) {
          $configureArgs = @('-init-submodules') + $configureArgs
        }
        & ..\qt5\configure.bat @configureArgs
        cmake --build . --parallel $env:NUMBER_OF_PROCESSORS
        cmake --install .
    - name: Package binaries
      run: |
        $qtDir = (Resolve-Path "$env:GITHUB_WORKSPACE\..\Qt6_binaries").Path
        Push-Location $qtDir
        7z a "$env:GITHUB_WORKSPACE\qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip" .
        Pop-Location
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip
        path: qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt6_${{ matrix.version_token }}_dynamic_binaries_win.zip" --clobber

  GenerateLinuxInstallerFramework:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install dependencies
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q \
          build-essential \
          ninja-build \
          zlib1g-dev \
          liblzma-dev \
          libbz2-dev
    - name: Build Qt Installer Framework
      run: |
        WORK_ROOT="$(cd .. && pwd)"

        cd "${WORK_ROOT}"
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 git clone --depth 1 https://code.qt.io/qt/qt5.git -b v${{ env.QIF_QT_VERSION }}
        cd qt5
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 ./init-repository -f --module-subset=qt5compat,qtbase,qtdeclarative,qttools,qttranslations

        cd "${WORK_ROOT}"
        mkdir qtifw_qt_build
        cd qtifw_qt_build
        ../qt5/configure \
          -prefix "${WORK_ROOT}/QtIfwQt" \
          -release \
          -static \
          -accessibility \
          -qt-zlib \
          -qt-libpng \
          -qt-libjpeg \
          -qt-pcre \
          -no-glib \
          -no-cups \
          -no-sql-sqlite \
          -no-feature-gssapi \
          -no-qml-debug \
          -no-opengl \
          -no-egl \
          -no-sm \
          -no-icu \
          -nomake examples \
          -nomake tests \
          -no-libudev \
          -bundled-xcb-xinput \
          -qt-harfbuzz \
          -qt-doubleconversion \
          -no-openssl \
          -opensource \
          -confirm-license \
          -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel "$(nproc)"
        cmake --install .

        cd "${WORK_ROOT}"
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 curl -fsSLO "https://download.qt.io/official_releases/qt-installer-framework/${{ env.QIF_VERSION }}/installer-framework-everywhere-src-${{ env.QIF_VERSION }}.tar.xz"
        tar xf "installer-framework-everywhere-src-${{ env.QIF_VERSION }}.tar.xz"
        IFW_SRC_DIR="$(find "${WORK_ROOT}" -maxdepth 1 -type d -name 'installer-framework-everywhere-src*' | head -n 1)"
        if [ -z "${IFW_SRC_DIR}" ]; then
          echo "Unable to locate extracted IFW source directory." >&2
          exit 1
        fi

        mkdir ifw_build
        cd ifw_build
        "${WORK_ROOT}/QtIfwQt/bin/qmake" "${IFW_SRC_DIR}/installerfw.pro"
        make -j"$(nproc)"
    - name: Package binaries
      run: |
        WORK_ROOT="$(cd .. && pwd)"
        PACKAGE_ROOT="${WORK_ROOT}/ifw_package"
        rm -rf "${PACKAGE_ROOT}"
        mkdir -p "${PACKAGE_ROOT}"
        cp -R "${WORK_ROOT}/ifw_build/bin" "${PACKAGE_ROOT}/bin"
        cp -R "${WORK_ROOT}/ifw_build/lib" "${PACKAGE_ROOT}/lib"
        tar cfvz "qt_ifw_${{ env.QIF_VERSION_TOKEN }}_linux.tar.gz" -C "${PACKAGE_ROOT}" .
    - uses: actions/upload-artifact@v7
      with:
        name: qt_ifw_${{ env.QIF_VERSION_TOKEN }}_linux.tar.gz
        path: qt_ifw_${{ env.QIF_VERSION_TOKEN }}_linux.tar.gz
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt_ifw_${{ env.QIF_VERSION_TOKEN }}_linux.tar.gz" --clobber

  GenerateMacOSInstallerFramework:
    runs-on: macos-26

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install dependencies
      run: |
        brew list ninja >/dev/null 2>&1 || brew install ninja
        brew list xz >/dev/null 2>&1 || brew install xz
    - name: Build Qt Installer Framework
      run: |
        WORK_ROOT="$(cd .. && pwd)"
        XZ_PREFIX="$(brew --prefix xz)"
        XZ_INCLUDE_DIR="${XZ_PREFIX}/include"
        XZ_STATIC_LIB="${XZ_PREFIX}/lib/liblzma.a"
        if [ ! -f "${XZ_INCLUDE_DIR}/lzma.h" ] || [ ! -f "${XZ_STATIC_LIB}" ]; then
          echo "Missing xz development files under ${XZ_PREFIX}" >&2
          exit 1
        fi

        cd "${WORK_ROOT}"
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 git clone --depth 1 https://code.qt.io/qt/qt5.git -b v${{ env.QIF_QT_VERSION }}
        cd qt5
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 ./init-repository -f --module-subset=qt5compat,qtbase,qtdeclarative,qttools,qttranslations

        cd "${WORK_ROOT}"
        mkdir qtifw_qt_build
        cd qtifw_qt_build
        ../qt5/configure \
          -prefix "${WORK_ROOT}/QtIfwQt" \
          -release \
          -static \
          -accessibility \
          -qt-zlib \
          -qt-libpng \
          -no-cups \
          -no-sql-sqlite \
          -no-qml-debug \
          -no-opengl \
          -nomake examples \
          -nomake tests \
          -no-freetype \
          -no-openssl \
          -opensource \
          -confirm-license \
          -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel "$(sysctl -n hw.ncpu)"
        cmake --install .

        cd "${WORK_ROOT}"
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 curl -fsSLO "https://download.qt.io/official_releases/qt-installer-framework/${{ env.QIF_VERSION }}/installer-framework-everywhere-src-${{ env.QIF_VERSION }}.tar.xz"
        tar xf "installer-framework-everywhere-src-${{ env.QIF_VERSION }}.tar.xz"
        IFW_SRC_DIR="$(find "${WORK_ROOT}" -maxdepth 1 -type d -name 'installer-framework-everywhere-src*' | head -n 1)"
        if [ -z "${IFW_SRC_DIR}" ]; then
          echo "Unable to locate extracted IFW source directory." >&2
          exit 1
        fi

        mkdir ifw_build
        cd ifw_build
        "${WORK_ROOT}/QtIfwQt/bin/qmake" "${IFW_SRC_DIR}/installerfw.pro" \
          "QMAKE_CFLAGS+=-I${XZ_INCLUDE_DIR}" \
          "QMAKE_CXXFLAGS+=-I${XZ_INCLUDE_DIR}" \
          "QMAKE_LFLAGS+=-L${XZ_PREFIX}/lib" \
          "IFW_LZMA_LIBRARY=${XZ_STATIC_LIB}"
        make -j"$(sysctl -n hw.ncpu)"
    - name: Package binaries
      run: |
        WORK_ROOT="$(cd .. && pwd)"
        PACKAGE_ROOT="${WORK_ROOT}/ifw_package"
        rm -rf "${PACKAGE_ROOT}"
        mkdir -p "${PACKAGE_ROOT}"
        cp -R "${WORK_ROOT}/ifw_build/bin" "${PACKAGE_ROOT}/bin"
        cp -R "${WORK_ROOT}/ifw_build/lib" "${PACKAGE_ROOT}/lib"
        tar cfvz "qt_ifw_${{ env.QIF_VERSION_TOKEN }}_macos.tar.gz" -C "${PACKAGE_ROOT}" .
    - uses: actions/upload-artifact@v7
      with:
        name: qt_ifw_${{ env.QIF_VERSION_TOKEN }}_macos.tar.gz
        path: qt_ifw_${{ env.QIF_VERSION_TOKEN }}_macos.tar.gz
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt_ifw_${{ env.QIF_VERSION_TOKEN }}_macos.tar.gz" --clobber

  GenerateWinInstallerFramework:
    runs-on: windows-2025

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install ninja
      run: |
        choco install ninja
    - name: Install IFW build dependencies
      shell: pwsh
      run: |
        $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
        git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
        & "$vcpkgRoot\bootstrap-vcpkg.bat"
        & "$vcpkgRoot\vcpkg.exe" install zlib:x64-windows-static bzip2:x64-windows-static liblzma:x64-windows-static
        "VCPKG_ROOT=$vcpkgRoot" | Add-Content -Path $env:GITHUB_ENV
    - name: Build Qt Installer Framework
      shell: pwsh
      run: |
        $workRoot = Resolve-Path (Join-Path $env:GITHUB_WORKSPACE '..')
        git clone --depth 1 https://code.qt.io/qt/qt5.git -b v${{ env.QIF_QT_VERSION }} (Join-Path $workRoot 'qt5')
        New-Item -ItemType Directory -Path (Join-Path $workRoot 'qtifw_qt_build') | Out-Null
        Set-Location (Join-Path $workRoot 'qtifw_qt_build')

        $customVcpkgRoot = $env:VCPKG_ROOT
        $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        if (-not $vsInstallPath) {
          throw 'Could not locate a Visual Studio installation with VC tools.'
        }
        $vcvarsPath = Join-Path $vsInstallPath 'VC\Auxiliary\Build\vcvars64.bat'
        cmd.exe /c "call `"$vcvarsPath`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object {
          if ($_ -match "^(.*?)=(.*)$") {
            Set-Content "env:\$($matches[1])" $matches[2]
          }
        }
        $env:VCPKG_ROOT = $customVcpkgRoot

        & (Join-Path $workRoot 'qt5\configure.bat') `
          -init-submodules `
          -submodules qt5compat,qtbase,qtdeclarative,qttools,qttranslations `
          -prefix (Join-Path $workRoot 'QtIfwQt') `
          -release `
          -static `
          -static-runtime `
          -accessibility `
          -no-icu `
          -no-openssl `
          -no-sql-sqlite `
          -no-qml-debug `
          -nomake examples `
          -nomake tests `
          -opensource `
          -confirm-license
        cmake --build . --parallel $env:NUMBER_OF_PROCESSORS
        cmake --install .

        $ifwArchive = Join-Path $workRoot 'installer-framework-everywhere-src-${{ env.QIF_VERSION }}.zip'
        Invoke-WebRequest `
          -Uri 'https://download.qt.io/official_releases/qt-installer-framework/${{ env.QIF_VERSION }}/installer-framework-everywhere-src-${{ env.QIF_VERSION }}.zip' `
          -OutFile $ifwArchive
        Expand-Archive -Path $ifwArchive -DestinationPath $workRoot -Force
        $ifwSourceDir = Get-ChildItem -Path $workRoot -Directory -Filter 'installer-framework-everywhere-src*' | Sort-Object FullName | Select-Object -First 1
        if (-not $ifwSourceDir) {
          throw 'Unable to locate extracted IFW source directory.'
        }

        $libRoot = Join-Path $env:VCPKG_ROOT 'installed\x64-windows-static'
        $env:INCLUDE = "$(Join-Path $libRoot 'include');$env:INCLUDE"
        $env:LIB = "$(Join-Path $libRoot 'lib');$env:LIB"
        $zlibLib = (Get-ChildItem -Path (Join-Path $libRoot 'lib') -Filter 'zlib*.lib' | Select-Object -First 1).FullName
        $bzip2Lib = (Get-ChildItem -Path (Join-Path $libRoot 'lib') -Filter '*bz2*.lib' | Select-Object -First 1).FullName
        $lzmaLib = (Get-ChildItem -Path (Join-Path $libRoot 'lib') -Filter '*lzma*.lib' | Select-Object -First 1).FullName
        if (-not $zlibLib -or -not $bzip2Lib -or -not $lzmaLib) {
          throw 'Failed to resolve one or more IFW compression libraries from vcpkg.'
        }

        New-Item -ItemType Directory -Path (Join-Path $workRoot 'ifw_build') | Out-Null
        Set-Location (Join-Path $workRoot 'ifw_build')
        & (Join-Path $workRoot 'QtIfwQt\bin\qmake.exe') `
          (Join-Path $ifwSourceDir.FullName 'installerfw.pro') `
          "IFW_ZLIB_LIBRARY=$zlibLib" `
          "IFW_BZIP2_LIBRARY=$bzip2Lib" `
          "IFW_LZMA_LIBRARY=$lzmaLib"
        nmake /NOLOGO
    - name: Package binaries
      shell: pwsh
      run: |
        $workRoot = Resolve-Path (Join-Path $env:GITHUB_WORKSPACE '..')
        $packageRoot = Join-Path $workRoot 'ifw_package'
        if (Test-Path $packageRoot) {
          Remove-Item -Path $packageRoot -Recurse -Force
        }
        New-Item -ItemType Directory -Path $packageRoot | Out-Null
        Copy-Item -Path (Join-Path $workRoot 'ifw_build\bin') -Destination (Join-Path $packageRoot 'bin') -Recurse
        Copy-Item -Path (Join-Path $workRoot 'ifw_build\lib') -Destination (Join-Path $packageRoot 'lib') -Recurse
        Push-Location $packageRoot
        7z a "$env:GITHUB_WORKSPACE\qt_ifw_${{ env.QIF_VERSION_TOKEN }}_win.zip" .
        Pop-Location
    - uses: actions/upload-artifact@v7
      with:
        name: qt_ifw_${{ env.QIF_VERSION_TOKEN }}_win.zip
        path: qt_ifw_${{ env.QIF_VERSION_TOKEN }}_win.zip
    - name: Upload to toolchain release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" "qt_ifw_${{ env.QIF_VERSION_TOKEN }}_win.zip" --clobber

  GenerateLinuxStaticBinaries:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Clone repository
      uses: actions/checkout@v5
    - name: Install dependencies
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q build-essential libgl1-mesa-dev libvulkan-dev ninja-build
    - name: Compile static Qt version
      run: |
        # Clone Qt6 repo
        cd ..
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        cd qt5
        "$GITHUB_WORKSPACE/scripts/ci/retry_command.sh" 3 15 ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools
        # Create shadow build folder
        cd ..
        mkdir qt6_shadow
        cd qt6_shadow
        # Add -opengl desktop to ensure OpenGL/WrapOpenGL CMake config is generated
        ../qt5/configure -static -release -prefix "../Qt6_binaries" -skip webengine -nomake tests -nomake examples -no-dbus -no-openssl -no-pch -opengl desktop -opensource -confirm-license -qt-libpng -qt-pcre -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Package binaries
      run: |
        tar cfvz qt6_6110_static_binaries_linux.tar.gz -C ../Qt6_binaries .
    - uses: actions/upload-artifact@v7
      with:
        name: qt6_6110_static_binaries_linux.tar.gz
        path: qt6_6110_static_binaries_linux.tar.gz
    - name: Create qt_binaries release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.QT_BINARY_RELEASE_TAG }}"
        gh release upload "${{ env.QT_BINARY_RELEASE_TAG }}" qt6_6110_static_binaries_linux.tar.gz --clobber

