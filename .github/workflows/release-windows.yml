name: Release Windows

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  WinDynamic:
    runs-on: windows-2025

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Determine release info
      id: release-info
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-latest" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
          echo "tag=dev_build" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-dev" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=none" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-local" >> "$GITHUB_OUTPUT"
          echo "should_upload=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Download Qt toolchain
      shell: cmd
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        call scripts\ci\download_toolchain.bat --kind qt --version "6.11.0" --linkage dynamic --output-dir "%RUNNER_TEMP%\qt"
    - name: Download Eigen package
      shell: cmd
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        call scripts\ci\download_toolchain.bat --kind eigen --version "5.0.1" --output-dir "%GITHUB_WORKSPACE%\src\external\eigen"
    - name: Configure and compile MNE-CPP
      run: |
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        ./scripts/build/build_project.bat
    - name: Deploy binaries (Windows)
      run: |
        echo "Qt environment:"
        echo "  QT_ROOT_DIR=$env:QT_ROOT_DIR"
        echo "  Qt6_DIR=$env:Qt6_DIR"
        Get-Command windeployqt -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
        ./scripts/deploy/deploy.bat dynamic pack
        # Verify archive size
        $archive = Get-Item mne-cpp-windows-dynamic-x86_64.zip -ErrorAction SilentlyContinue
        if ($archive) {
          $sizeMB = [math]::Round($archive.Length / 1MB)
          echo "Archive size: ${sizeMB} MB"
          if ($sizeMB -lt 30) {
            echo "ERROR: Archive is too small (${sizeMB} MB). Qt DLLs likely missing."
            echo "Listing archive contents..."
            7z l mne-cpp-windows-dynamic-x86_64.zip | Select-String "Qt6" | Select-Object -First 10
            exit 1
          }
        } else {
          echo "ERROR: Archive file not found!"
          exit 1
        }
    - name: Upload release binaries
      if: steps.release-info.outputs.should_upload == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-windows-dynamic-x86_64.zip "${{ steps.release-info.outputs.prefix }}-windows-dynamic-x86_64.zip"
        gh release upload "${{ steps.release-info.outputs.tag }}" "${{ steps.release-info.outputs.prefix }}-windows-dynamic-x86_64.zip" --clobber


  WinStatic:
    runs-on: windows-2025

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Determine release info
      id: release-info
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-latest" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
          echo "tag=dev_build" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-dev" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=none" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-local" >> "$GITHUB_OUTPUT"
          echo "should_upload=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install ninja
      run: |
        choco install ninja
    - name: Download Eigen package
      shell: cmd
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        call scripts\ci\download_toolchain.bat --kind eigen --version "5.0.1" --output-dir "%GITHUB_WORKSPACE%\src\external\eigen"
    - name: Cache static Qt binaries
      id: cache-qt-static
      uses: actions/cache@v5
      with:
        path: Qt6_static
        key: qt-6.11.0-static-windows-x86_64
    - name: Download pre-built static Qt
      id: download-qt-static
      if: steps.cache-qt-static.outputs.cache-hit != 'true'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download qt_binaries -p "qt6_6110_static_binaries_win.zip" -D $env:TEMP
        mkdir Qt6_static -Force
        7z x "$env:TEMP\qt6_6110_static_binaries_win.zip" -o"Qt6_static" -y
    - name: Build static Qt from source
      if: steps.cache-qt-static.outputs.cache-hit != 'true' && steps.download-qt-static.outcome != 'success'
      run: |
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        mkdir qt6_shadow
        cd qt6_shadow
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        ..\qt5\configure.bat -release -static -no-pch -optimize-size -opengl desktop -platform win32-msvc -prefix "$env:GITHUB_WORKSPACE\Qt6_static" -skip webengine -nomake tests -nomake examples -opensource -confirm-license -init-submodules -submodules qtbase,qtsvg,qtshadertools
        cmake --build . --parallel $env:NUMBER_OF_PROCESSORS
        cmake --install .
    - name: Configure and compile MNE-CPP (static)
      run: |
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        $env:CMAKE_PREFIX_PATH = "$env:GITHUB_WORKSPACE\Qt6_static"
        ./scripts/build/build_project.bat static
    - name: Deploy binaries (Windows)
      run: |
        ./scripts/deploy/deploy.bat static pack
    - name: Upload release binaries
      if: steps.release-info.outputs.should_upload == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-windows-static-x86_64.zip "${{ steps.release-info.outputs.prefix }}-windows-static-x86_64.zip"
        gh release upload "${{ steps.release-info.outputs.tag }}" "${{ steps.release-info.outputs.prefix }}-windows-static-x86_64.zip" --clobber
