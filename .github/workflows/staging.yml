# ═══════════════════════════════════════════════════════════════════════════
# Staging Branch Pipeline
# ═══════════════════════════════════════════════════════════════════════════
#
# Triggered on pushes to `staging`.
#
# This is the DEVELOPMENT pipeline:
#   • Creates/updates a rolling "dev_build" pre-release on GitHub
#   • Builds development binaries for Linux, macOS, Windows
#   • Builds cross-platform installers (Linux .run, macOS .dmg, Windows .exe)
#   • Runs full test suite with coverage threshold & regression checks
#     (fails if coverage < minimum threshold or drops from previous run)
#   • Uploads coverage to Codecov (alongside local threshold checks)
#   • Deploys dev website     → mne-cpp.github.io/dev/
#   • Deploys dev Doxygen API → mne-cpp.github.io/doxygen-api/dev/
#   • Builds WebAssembly dev version
#
# Coverage is uploaded to Codecov AND checked locally via fastcov with:
#   1) A minimum threshold (configurable via COVERAGE_THRESHOLD env var)
#   2) Regression detection (compares to previous run's baseline)
#
# Branch model:  Feature → Staging → Main
# ═══════════════════════════════════════════════════════════════════════════
name: Staging

on:
  push:
    branches:
      - staging

# Cancel superseded runs
concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  # Minimum acceptable line coverage percentage (libraries only).
  # The pipeline will FAIL if coverage drops below this.
  COVERAGE_THRESHOLD: 50

jobs:

  # ── Create / update dev_build pre-release ────────────────────────────────
  CreateDevRelease:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Update dev_build tag and release
      timeout-minutes: 5
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        set -x
        git config --global user.email christoph.dinh@mne-cpp.org
        git config --global user.name chdinh
        git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}

        # Delete existing dev_build release (if any)
        if gh release view dev_build > /dev/null 2>&1; then
          gh release delete dev_build --yes --cleanup-tag
        fi
        git push origin :refs/tags/dev_build 2>/dev/null || true

        # Create new tag + pre-release
        git tag dev_build -f -a -m "Development Builds"
        git push origin dev_build -f
        gh release create dev_build \
          --prerelease \
          --title "Development Builds" \
          --notes "Latest development builds from the staging branch. These are pre-release builds for testing." \
          --target ${{ github.sha }}

  # ── Platform release builds (parallel) ───────────────────────────────────
  Linux:
    needs: CreateDevRelease
    uses: ./.github/workflows/release-linux.yml
    secrets: inherit

  MacOS:
    needs: CreateDevRelease
    uses: ./.github/workflows/release-macos.yml
    secrets: inherit

  Windows:
    needs: CreateDevRelease
    uses: ./.github/workflows/release-windows.yml
    secrets: inherit

  # ── Installers (after all platform builds) ─────────────────────────────
  Installer:
    needs: [Linux, MacOS, Windows]
    uses: ./.github/workflows/release-installer.yml
    secrets: inherit

  # ── Build compatibility matrix (min + max Qt) ───────────────────────────
  BuildMinQt:
    uses: ./.github/workflows/_reusable-build.yml
    with:
      qt_version: '6.10.0'

  BuildMaxQt:
    uses: ./.github/workflows/_reusable-build.yml
    with:
      qt_version: '6.11.0'

  # ── Tests with coverage threshold & regression checks ────────────────────
  # Add [skip-coverage] to your commit message to skip coverage analysis.
  # Coverage is only collected on Ubuntu; macOS/Windows always run without it.
  Tests:
    uses: ./.github/workflows/_reusable-tests.yml
    with:
      with_code_coverage: ${{ !contains(github.event.head_commit.message, '[skip-coverage]') }}
      upload_codecov: ${{ !contains(github.event.head_commit.message, '[skip-coverage]') }}
      coverage_threshold: ${{ contains(github.event.head_commit.message, '[skip-coverage]') && 0 || 20 }}
      fail_on_coverage_regression: ${{ !contains(github.event.head_commit.message, '[skip-coverage]') }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Doxygen API documentation (dev) ──────────────────────────────────────
  Doxygen:
    runs-on: ubuntu-24.04
    needs: CreateDevRelease

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install Doxygen 1.16.1 and Graphviz
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -qq
        sudo apt-get install -qq qttools5-dev-tools graphviz
        wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz
        tar xzf doxygen-1.16.1.linux.bin.tar.gz
        sudo install -m 755 doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen

    - name: Run Doxygen
      run: |
        cd doc/doxygen
        doxygen mne-cpp_doxyfile

    - name: Deploy qch to dev_build release
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp doc/doxygen/qt-creator_doc/mne-cpp.qch mne-cpp-dev-doc-qtcreator.qch
        gh release upload dev_build mne-cpp-dev-doc-qtcreator.qch --clobber

    - name: Deploy Doxygen to GitHub Pages (dev subdirectory)
      env:
        GIT_CREDENTIALS: ${{ secrets.GIT_CREDENTIALS }}
      run: |
        cd doc/doxygen
        git config --global user.email christoph.dinh@mne-cpp.org
        git config --global user.name chdinh
        # Clone doxygen-api repo
        git clone -b gh-pages "https://${GIT_CREDENTIALS}@github.com/mne-cpp/doxygen-api" gh-pages
        cd gh-pages
        # Only update the /dev subdirectory — preserve stable root docs
        rm -rf dev
        mkdir -p dev
        cp -r ../html/* dev/
        git add .
        git commit -m 'Update dev API docs' --allow-empty
        git push origin gh-pages

  # ── Website (dev version) ────────────────────────────────────────────────
  Website:
    runs-on: ubuntu-24.04
    needs: CreateDevRelease

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: doc/website/package-lock.json

    - name: Build Docusaurus site (dev)
      env:
        MNECPP_SITE_ENV: dev
        DOCUSAURUS_BASE_URL: /dev/
      run: |
        cd doc/website
        npm ci
        npm run build

    - name: Deploy to mne-cpp.github.io/dev/
      env:
        GIT_CREDENTIALS: ${{ secrets.GIT_CREDENTIALS }}
      run: |
        git config --global user.email christoph.dinh@mne-cpp.org
        git config --global user.name chdinh
        git clone -b main --single-branch "https://${GIT_CREDENTIALS}@github.com/mne-cpp/mne-cpp.github.io.git"
        cd mne-cpp.github.io

        # Only update the /dev subdirectory — preserve online installer repos.
        if [ -d "dev/installer" ]; then
          mkdir -p /tmp/website-dev-installer-backup
          cp -r dev/installer /tmp/website-dev-installer-backup/
        fi

        # Only update the /dev subdirectory — preserve stable root docs
        rm -rf dev
        mkdir -p dev
        cp -RT ../doc/website/build dev/

        if [ -d "/tmp/website-dev-installer-backup/installer" ]; then
          mkdir -p dev
          cp -r /tmp/website-dev-installer-backup/installer dev/
        fi

        git add .
        git commit -m 'Update dev website' --allow-empty
        git push origin main

  # ── WebAssembly (dev) ────────────────────────────────────────────────────
  WebAssembly:
    runs-on: ubuntu-24.04
    needs: CreateDevRelease

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential libgl1-mesa-dev ninja-build

    - name: Setup Emscripten
      run: |
        cd ..
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk
        ./emsdk install 4.0.7
        ./emsdk activate 4.0.7

    - name: Download pre-built WASM Qt binaries
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download qt_binaries -p 'qt6_6110_static_binaries_wasm.tar.gz' -D /tmp
        mkdir -p ${{ runner.tool_cache }}/Qt/6.11.0/wasm_multithread
        tar xf /tmp/qt6_6110_static_binaries_wasm.tar.gz -C ${{ runner.tool_cache }}/Qt/6.11.0/wasm_multithread
        echo "Qt6_DIR=${{ runner.tool_cache }}/Qt/6.11.0" >> $GITHUB_ENV

    - name: Download host Qt binaries for cross-compilation
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download qt_binaries -p 'qt6_6110_static_binaries_linux.tar.gz' -D /tmp
        mkdir -p ${{ runner.tool_cache }}/Qt/6.11.0/gcc_64
        tar xf /tmp/qt6_6110_static_binaries_linux.tar.gz -C ${{ runner.tool_cache }}/Qt/6.11.0/gcc_64

    - name: Download Eigen package
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind eigen \
          --version "5.0.1" \
          --output-dir "$GITHUB_WORKSPACE/src/external/eigen"

    - name: Build WASM
      run: |
        source ../emsdk/emsdk_env.sh
        ./scripts/wasm.sh --emsdk 4.0.7

    - name: Prepare WASM artifacts
      run: |
        rm -rf out/wasm/bin/mne_analyze_plugins
        rm -rf resources/data
        cp resources/design/logos/qtlogo.svg out/wasm/bin/qtlogo.svg
        if [ -d "out/wasm/examples" ]; then
          cp resources/design/logos/qtlogo.svg out/wasm/examples/qtlogo.svg
        fi

    - name: Package and upload WASM to dev_build release
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        tar cfz mne-cpp-wasm.tar.gz -C out/wasm .
      
    - name: Upload WASM to dev_build release
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-wasm.tar.gz mne-cpp-dev-wasm.tar.gz
        gh release upload dev_build mne-cpp-dev-wasm.tar.gz --clobber

    - name: Deploy dev WASM to mne-cpp/wasm repository
      env:
        GIT_CREDENTIALS: ${{ secrets.GIT_CREDENTIALS }}
      run: |
        git config --global user.email christoph.dinh@mne-cpp.org
        git config --global user.name chdinh
        git clone "https://${GIT_CREDENTIALS}@github.com/mne-cpp/wasm.git" wasm-repo
        cd wasm-repo

        deploy_branch_dev_subdir() {
          local branch="$1"

          if git rev-parse --verify "origin/${branch}" > /dev/null 2>&1; then
            git checkout "${branch}"
          else
            git checkout --orphan "${branch}"
            git rm -rf --ignore-unmatch .
            git clean -f -d
            touch .nojekyll
          fi

          rm -rf dev
          mkdir -p dev
          cp -RT ../out/wasm/bin dev
          if [ -d "../out/wasm/examples" ]; then
            mkdir -p dev/examples
            cp -RT ../out/wasm/examples dev/examples
          fi

          git add .
          git commit -m "Update dev wasm builds" --allow-empty
          git push origin "${branch}"
        }

        deploy_branch_dev_subdir gh-pages
        deploy_branch_dev_subdir main
