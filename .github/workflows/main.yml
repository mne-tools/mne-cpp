# ═══════════════════════════════════════════════════════════════════════════
# Main Branch Pipeline
# ═══════════════════════════════════════════════════════════════════════════
#
# Triggered on pushes to `main` and version tags (v*).
#
# ┌────────────────────┬────────────────────────────────────────────────────┐
# │ Trigger            │ What runs                                         │
# ├────────────────────┼────────────────────────────────────────────────────┤
# │ Push to main       │ Tests + Codecov, build matrix (min/max Qt),       │
# │                    │ deploy production website + Doxygen API docs      │
# ├────────────────────┼────────────────────────────────────────────────────┤
# │ Tag v* on main     │ GitHub Release, platform binaries (Linux/macOS/   │
# │                    │ Windows, dynamic+static), cross-platform          │
# │                    │ installers, WebAssembly build, release Doxygen    │
# │                    │ qch upload. Non-release jobs are SKIPPED to       │
# │                    │ avoid duplicate runs and release-creation races.  │
# └────────────────────┴────────────────────────────────────────────────────┘
#
# To cut a release:
#   git tag v2.0.1 -a -m "Release v2.0.1"
#   git push origin v2.0.1
#
# Branch model:  Feature → Staging → Main
# ═══════════════════════════════════════════════════════════════════════════
name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

# Cancel superseded runs on the same branch/tag
concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

# ═══════════════════════════════════════════════════════════════════════════
# Jobs that run ONLY on branch pushes to main (skipped on tag pushes to
# avoid duplicate runs when both main push and tag push trigger together)
# ═══════════════════════════════════════════════════════════════════════════
jobs:

  # ── Build compatibility matrix (min + max Qt) ───────────────────────────
  BuildMinQt:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/_reusable-build.yml
    with:
      qt_version: '6.10.0'

  BuildMaxQt:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/_reusable-build.yml
    with:
      qt_version: '6.11.0'

  # ── Tests with Codecov coverage ──────────────────────────────────────────
  Tests:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/_reusable-tests.yml
    with:
      with_code_coverage: true
      upload_codecov: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Doxygen API documentation (production) ───────────────────────────────
  Doxygen:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install Doxygen 1.16.1 and Graphviz
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -qq
        sudo apt-get install -qq qttools5-dev-tools graphviz
        wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz
        tar xzf doxygen-1.16.1.linux.bin.tar.gz
        sudo install -m 755 doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen

    - name: Run Doxygen
      run: |
        cd doc/doxygen
        doxygen mne-cpp_doxyfile

    - name: Deploy Doxygen to GitHub Pages (production)
      env:
        GIT_CREDENTIALS: ${{ secrets.GIT_CREDENTIALS }}
      run: |
        cd doc/doxygen
        git config --global user.email christoph.dinh@mne-cpp.org
        git config --global user.name chdinh
        # Deploy to the root (stable) of doxygen-api
        git clone -b gh-pages "https://${GIT_CREDENTIALS}@github.com/mne-cpp/doxygen-api" gh-pages
        cd gh-pages
        # Preserve /dev directory if it exists (staging docs)
        if [ -d "dev" ]; then
          cp -r dev /tmp/doxygen-dev-backup
        fi
        # Remove everything except .git
        find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
        # Copy new docs
        touch .nojekyll
        cp -r ../html/. .
        # Restore /dev directory
        if [ -d "/tmp/doxygen-dev-backup" ]; then
          cp -r /tmp/doxygen-dev-backup dev
        fi
        git add .
        git commit -m 'Update stable API docs' --allow-empty
        git push origin gh-pages

  # ── Website (production) ─────────────────────────────────────────────────
  Website:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: doc/website/package-lock.json

    - name: Build Docusaurus site (production)
      env:
        MNECPP_SITE_ENV: stable
      run: |
        cd doc/website
        npm ci
        npm run build

    - name: Deploy to mne-cpp.github.io
      env:
        GIT_CREDENTIALS: ${{ secrets.GIT_CREDENTIALS }}
      run: |
        git config --global user.email christoph.dinh@mne-cpp.org
        git config --global user.name chdinh
        git clone -b main --single-branch "https://${GIT_CREDENTIALS}@github.com/mne-cpp/mne-cpp.github.io.git"
        cd mne-cpp.github.io

        # Preserve /dev directory (staging website) and online installer repos.
        if [ -d "dev" ]; then
          cp -r dev /tmp/website-dev-backup
        fi
        if [ -d "installer" ]; then
          cp -r installer /tmp/website-installer-backup
        fi

        # Remove everything except .git
        find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

        # Copy the stable Docusaurus build to the root
        cp -r ../doc/website/build/. .

        # Restore /dev directory
        if [ -d "/tmp/website-dev-backup" ]; then
          cp -r /tmp/website-dev-backup dev
        fi
        if [ -d "/tmp/website-installer-backup" ]; then
          cp -r /tmp/website-installer-backup installer
        fi

        git add .
        git commit -m 'Update website' --allow-empty
        git push origin main

  # ═══════════════════════════════════════════════════════════════════════════
  # Jobs that run ONLY on version tags (v*)  — the actual release pipeline
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Create GitHub Release ────────────────────────────────────────────────
  CreateRelease:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Create version branch for new minor releases
      run: |
        currentVersionPatch=$(echo ${GITHUB_REF#refs/tags/} | cut -d. -f3)
        if [[ "$currentVersionPatch" == 0 ]]; then
          echo "New minor version — branching off ${GITHUB_REF#refs/tags/}"
          git config --global user.email christoph.dinh@mne-cpp.org
          git config --global user.name chdinh
          git checkout -b ${GITHUB_REF#refs/tags/}
          git push origin refs/heads/${GITHUB_REF#refs/tags/}
        fi

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        gh release create "$TAG" \
          --title "MNE-CPP $TAG" \
          --generate-notes \
          --target ${{ github.sha }}

  # ── Release Doxygen qch (depends on CreateRelease) ────────────────────────
  ReleaseDocs:
    if: startsWith(github.ref, 'refs/tags/')
    needs: CreateRelease
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install Doxygen 1.16.1 and Graphviz
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -qq
        sudo apt-get install -qq qttools5-dev-tools graphviz
        wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz
        tar xzf doxygen-1.16.1.linux.bin.tar.gz
        sudo install -m 755 doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen

    - name: Run Doxygen
      run: |
        cd doc/doxygen
        doxygen mne-cpp_doxyfile

    - name: Upload qch to GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp doc/doxygen/qt-creator_doc/mne-cpp.qch "mne-cpp-${{ github.ref_name }}-doc-qtcreator.qch"
        gh release upload "${{ github.ref_name }}" "mne-cpp-${{ github.ref_name }}-doc-qtcreator.qch" --clobber

  # ── Platform release builds (parallel) ───────────────────────────────────
  Linux:
    if: startsWith(github.ref, 'refs/tags/')
    needs: CreateRelease
    uses: ./.github/workflows/release-linux.yml
    secrets: inherit

  MacOS:
    if: startsWith(github.ref, 'refs/tags/')
    needs: CreateRelease
    uses: ./.github/workflows/release-macos.yml
    secrets: inherit

  Windows:
    if: startsWith(github.ref, 'refs/tags/')
    needs: CreateRelease
    uses: ./.github/workflows/release-windows.yml
    secrets: inherit

  # ── Installers (after all platform builds) ───────────────────────────────
  Installer:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [Linux, MacOS, Windows]
    uses: ./.github/workflows/release-installer.yml
    secrets: inherit

  # ── WebAssembly ──────────────────────────────────────────────────────────
  WebAssembly:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    needs: CreateRelease

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential libgl1-mesa-dev ninja-build

    - name: Setup Emscripten
      run: |
        cd ..
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk
        ./emsdk install 4.0.7
        ./emsdk activate 4.0.7

    - name: Download pre-built WASM Qt binaries
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download qt_binaries -p 'qt6_6110_static_binaries_wasm.tar.gz' -D /tmp
        mkdir -p ${{ runner.tool_cache }}/Qt/6.11.0/wasm_multithread
        tar xf /tmp/qt6_6110_static_binaries_wasm.tar.gz -C ${{ runner.tool_cache }}/Qt/6.11.0/wasm_multithread
        echo "Qt6_DIR=${{ runner.tool_cache }}/Qt/6.11.0" >> $GITHUB_ENV

    - name: Download host Qt binaries for cross-compilation
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download qt_binaries -p 'qt6_6110_static_binaries_linux.tar.gz' -D /tmp
        mkdir -p ${{ runner.tool_cache }}/Qt/6.11.0/gcc_64
        tar xf /tmp/qt6_6110_static_binaries_linux.tar.gz -C ${{ runner.tool_cache }}/Qt/6.11.0/gcc_64

    - name: Download Eigen package
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind eigen \
          --version "5.0.1" \
          --output-dir "$GITHUB_WORKSPACE/src/external/eigen"

    - name: Build WASM
      run: |
        source ../emsdk/emsdk_env.sh
        ./scripts/wasm.sh --emsdk 4.0.7

    - name: Prepare WASM artifacts
      run: |
        rm -rf out/wasm/bin/mne_analyze_plugins
        rm -rf resources/data
        cp resources/design/logos/qtlogo.svg out/wasm/bin/qtlogo.svg
        if [ -d "out/wasm/examples" ]; then
          cp resources/design/logos/qtlogo.svg out/wasm/examples/qtlogo.svg
        fi

    - name: Package WASM
      run: |
        tar cfz mne-cpp-wasm.tar.gz -C out/wasm .

    - name: Upload WASM to GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-wasm.tar.gz "mne-cpp-${{ github.ref_name }}-wasm.tar.gz"
        gh release upload "${{ github.ref_name }}" "mne-cpp-${{ github.ref_name }}-wasm.tar.gz" --clobber

    - name: Deploy WASM to mne-cpp/wasm repository
      env:
        GIT_CREDENTIALS: ${{ secrets.GIT_CREDENTIALS }}
      run: |
        git config --global user.email christoph.dinh@mne-cpp.org
        git config --global user.name chdinh
        git clone "https://${GIT_CREDENTIALS}@github.com/mne-cpp/wasm.git" wasm-repo
        cd wasm-repo

        # --- gh-pages branch ---
        if git rev-parse --verify origin/gh-pages > /dev/null 2>&1; then
          git checkout gh-pages
        else
          git checkout --orphan gh-pages
        fi
        if [ -d "dev" ]; then
          cp -r dev /tmp/wasm-gh-pages-dev-backup
        fi
        git rm -rf --ignore-unmatch .
        git clean -f -d
        git commit --allow-empty -m 'Update wasm builds'
        cp -RT ../out/wasm/bin .
        if [ -d "../out/wasm/examples" ]; then
          mkdir -p examples
          cp -RT ../out/wasm/examples examples
        fi
        if [ -d "/tmp/wasm-gh-pages-dev-backup" ]; then
          cp -r /tmp/wasm-gh-pages-dev-backup dev
        fi
        git add .
        git commit --amend --reset-author -m 'Update wasm builds'
        git push -f origin gh-pages

        # --- main branch ---
        if git rev-parse --verify origin/main > /dev/null 2>&1; then
          git checkout main
        else
          git checkout --orphan main
        fi
        if [ -d "dev" ]; then
          cp -r dev /tmp/wasm-main-dev-backup
        fi
        git rm -rf --ignore-unmatch .
        git clean -f -d
        git commit --allow-empty -m 'Update wasm builds'
        cp -RT ../out/wasm/bin .
        if [ -d "../out/wasm/examples" ]; then
          mkdir -p examples
          cp -RT ../out/wasm/examples examples
        fi
        if [ -d "/tmp/wasm-main-dev-backup" ]; then
          cp -r /tmp/wasm-main-dev-backup dev
        fi
        git add .
        git commit --amend --reset-author -m 'Update wasm builds'
        git push -f origin main
