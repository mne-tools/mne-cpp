name: BuildEigenArtifacts

on:
  workflow_dispatch:
  push:
    branches:
    # Change this to the branch name which you are developing on to trigger the workflow
    - generateeigen

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  EIGEN_VERSION: '5.0.1'
  EIGEN_VERSION_TOKEN: '501'
  EIGEN_ARTIFACT_RELEASE_TAG: eigen_artifacts
  TOOLCHAIN_RELEASE_TITLE: Eigen SDK Artifacts
  TOOLCHAIN_RELEASE_NOTES: Reusable Eigen CMake package bundles for CI and local development.

jobs:
  GenerateEigenPackage:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q cmake ninja-build zip

    - name: Download Eigen source release
      run: |
        curl --fail --location --silent --show-error \
          --output eigen-${{ env.EIGEN_VERSION }}.tar.gz \
          "https://gitlab.com/libeigen/eigen/-/archive/${{ env.EIGEN_VERSION }}/eigen-${{ env.EIGEN_VERSION }}.tar.gz"
        tar xzf eigen-${{ env.EIGEN_VERSION }}.tar.gz

    - name: Configure, build and install Eigen package
      run: |
        cmake -S "eigen-${{ env.EIGEN_VERSION }}" -B eigen-build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/eigen-install" \
          -DBUILD_TESTING=OFF \
          -DEIGEN_BUILD_TESTING=OFF \
          -DEIGEN_BUILD_DOC=OFF \
          -DEIGEN_BUILD_BTL=OFF \
          -DEIGEN_BUILD_DEMOS=OFF \
          -DEIGEN_BUILD_SPBENCH=OFF \
          -DEIGEN_BUILD_BLAS=OFF \
          -DEIGEN_BUILD_LAPACK=OFF \
          -DEIGEN_BUILD_CMAKE_PACKAGE=ON
        cmake --build eigen-build
        cmake --install eigen-build

    - name: Package Eigen bundles
      shell: bash
      run: |
        tar cfvz "eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.tar.gz" -C eigen-install .
        (
          cd eigen-install
          zip -rq "$GITHUB_WORKSPACE/eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.zip" .
        )

    - uses: actions/upload-artifact@v7
      with:
        name: eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.tar.gz
        path: eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.tar.gz

    - uses: actions/upload-artifact@v7
      with:
        name: eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.zip
        path: eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.zip

    - name: Create dependency release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.EIGEN_ARTIFACT_RELEASE_TAG }}"
        gh release upload "${{ env.EIGEN_ARTIFACT_RELEASE_TAG }}" "eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.tar.gz" --clobber
        gh release upload "${{ env.EIGEN_ARTIFACT_RELEASE_TAG }}" "eigen_${{ env.EIGEN_VERSION_TOKEN }}_any.zip" --clobber
