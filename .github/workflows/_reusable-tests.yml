# ---------------------------------------------------------------------------
# Reusable workflow: Build & Test MNE-CPP
# Called by main.yml, staging.yml, and pull-request.yml
# ---------------------------------------------------------------------------
name: Reusable Tests

on:
  workflow_call:
    inputs:
      with_code_coverage:
        description: "Enable gcov code coverage instrumentation (Linux only)"
        required: false
        default: false
        type: boolean
      upload_codecov:
        description: "Upload coverage to Codecov (requires CODECOV_TOKEN secret)"
        required: false
        default: false
        type: boolean
      coverage_threshold:
        description: "Minimum coverage % — workflow fails if below this (0 = disabled)"
        required: false
        default: 0
        type: number
      fail_on_coverage_regression:
        description: "Fail if coverage drops compared to previous baseline"
        required: false
        default: false
        type: boolean
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  Tests:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-24.04, macos-26, windows-2025]

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-24.04'
      run: |
        sudo apt-get update -q
        sudo apt-get install -q libgl1-mesa-dev

    - name: Clone mne-cpp test data
      run: git clone https://github.com/mne-tools/mne-cpp-test-data.git resources/data/mne-cpp-test-data

    - name: Install Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: ${{ matrix.os == 'macos-26' && 'arm64' || 'x64' }}

    - name: Download Qt toolchain (Linux|MacOS)
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'macos-26'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind qt \
          --version "6.11.0" \
          --linkage dynamic \
          --output-dir "$RUNNER_TEMP/qt"

    - name: Download Eigen package (Linux|MacOS)
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'macos-26'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind eigen \
          --version "5.0.1" \
          --output-dir "$GITHUB_WORKSPACE/src/external/eigen"

    - name: Download Qt toolchain (Windows)
      if: matrix.os == 'windows-2025'
      shell: cmd
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        call scripts\ci\download_toolchain.bat --kind qt --version "6.11.0" --linkage dynamic --output-dir "%RUNNER_TEMP%\qt"

    - name: Download Eigen package (Windows)
      if: matrix.os == 'windows-2025'
      shell: cmd
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        call scripts\ci\download_toolchain.bat --kind eigen --version "5.0.1" --output-dir "%GITHUB_WORKSPACE%\src\external\eigen"

    - name: Install MNE-Python
      run: |
        pip install --upgrade pip
        pip install mne numpy scipy

    - name: Cache MNE sample data
      id: cache-mne-data
      uses: actions/cache@v5
      with:
        path: ~/mne_data/MNE-sample-data
        key: mne-sample-data-v1

    - name: Download MNE sample data
      if: steps.cache-mne-data.outputs.cache-hit != 'true'
      run: |
        python -c "import mne; mne.datasets.sample.data_path()"

    # ── Build ──────────────────────────────────────────────────────────────
    - name: Configure and compile MNE-CPP (Linux)
      if: matrix.os == 'ubuntu-24.04'
      run: |
        COV_FLAG=""
        if [ "${{ inputs.with_code_coverage }}" = "true" ]; then
          COV_FLAG="-DWITH_CODE_COV=ON"
        fi
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON ${COV_FLAG}
        cmake --build build -j $(nproc)

    - name: Configure and compile MNE-CPP (MacOS)
      if: matrix.os == 'macos-26'
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
        cmake --build build -j $(sysctl -n hw.logicalcpu)

    - name: Configure and compile MNE-CPP (Windows)
      if: matrix.os == 'windows-2025'
      run: |
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
        cmake --build build --config Release --parallel

    # ── Run tests ──────────────────────────────────────────────────────────
    - name: Run tests (Linux)
      if: matrix.os == 'ubuntu-24.04'
      env:
        QTEST_FUNCTION_TIMEOUT: ${{ inputs.with_code_coverage && 1800000 || 900000 }}
        QT_QPA_PLATFORM: offscreen
        MNE_DATA: ~/mne_data
      run: |
        if [ "${{ inputs.with_code_coverage }}" = "true" ]; then
          ./scripts/test_all.bat verbose withCoverage
        else
          ./scripts/test_all.bat verbose
        fi

    - name: Run tests (MacOS)
      if: matrix.os == 'macos-26'
      env:
        QTEST_FUNCTION_TIMEOUT: 900000
        QT_QPA_PLATFORM: offscreen
        MNE_DATA: ~/mne_data
      run: |
        ./scripts/test_all.bat Release verbose

    - name: Run tests (Windows)
      if: matrix.os == 'windows-2025'
      env:
        QTEST_FUNCTION_TIMEOUT: 900000
        MNE_DATA: ~/mne_data
      run: |
        ./scripts/test_all.bat Release verbose

    # ── Coverage: generate filtered report (lcov) ──────────────────────
    - name: Install lcov
      if: matrix.os == 'ubuntu-24.04' && inputs.with_code_coverage
      run: sudo apt-get install -y lcov

    - name: Generate coverage report (lcov)
      id: lcov
      if: matrix.os == 'ubuntu-24.04' && inputs.with_code_coverage
      run: |
        echo "=== Coverage diagnostics ==="
        echo "gcno files: $(find build -name '*.gcno' 2>/dev/null | wc -l)"
        echo "gcda files: $(find build -name '*.gcda' 2>/dev/null | wc -l)"

        LCOV_OPTS="--ignore-errors mismatch,inconsistent,gcov,negative"

        # 1. Baseline: capture all instrumented lines as 0-hit (from .gcno)
        #    This ensures EVERY compiled source file appears in the report,
        #    even if no test executed it.
        lcov --initial --capture --directory build \
             --output-file coverage_base.info --no-external $LCOV_OPTS

        # 2. Test coverage: capture execution hits (from .gcda)
        lcov --capture --directory build \
             --output-file coverage_test.info --no-external $LCOV_OPTS

        # 3. Combine: baseline guarantees full line counts; test data adds hits
        lcov --add-tracefile coverage_base.info \
             --add-tracefile coverage_test.info \
             --output-file coverage_combined.info $LCOV_OPTS

        # 4. Extract only MNE-CPP source directories
        lcov --extract coverage_combined.info \
             '*/src/libraries/*' '*/src/applications/*' '*/src/tools/*' \
             --output-file coverage_filtered.info $LCOV_OPTS

        # 5. Remove third-party / generated paths that may have slipped in
        lcov --remove coverage_filtered.info \
             '*/Qt/*' '*/eigen/*' '/usr/*' '*mocs_compilation*' \
             --output-file coverage_filtered.info $LCOV_OPTS

        # Report statistics
        TOTAL_LINES=$(grep -c "^DA:" coverage_filtered.info 2>/dev/null || echo "0")
        HIT_LINES=$(grep "^DA:" coverage_filtered.info | awk -F, '$2 > 0' | wc -l 2>/dev/null || echo "0")
        if [ "$TOTAL_LINES" -gt 0 ]; then
          COVERAGE=$(awk "BEGIN {printf \"%.2f\", $HIT_LINES * 100.0 / $TOTAL_LINES}")
        else
          COVERAGE="0"
        fi
        echo "Total line coverage: ${COVERAGE}%"
        echo "Total lines:         ${TOTAL_LINES}"
        echo "Hit lines:           ${HIT_LINES}"
        echo "coverage=${COVERAGE}" >> "$GITHUB_OUTPUT"

    # ── Coverage: Codecov upload ──────────────────────────────────────────
    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-24.04' && inputs.upload_codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage_filtered.info
        disable_search: true
        fail_ci_if_error: true

    # ── Coverage: threshold & regression check ─────────────────────────────
    - name: Restore previous coverage baseline
      id: prev-coverage
      if: matrix.os == 'ubuntu-24.04' && inputs.fail_on_coverage_regression
      uses: actions/cache/restore@v5
      with:
        path: .coverage-baseline
        key: coverage-baseline-v2-${{ github.ref_name }}

    - name: Check coverage threshold & regression
      if: matrix.os == 'ubuntu-24.04' && inputs.with_code_coverage && inputs.coverage_threshold > 0
      env:
        CURRENT: ${{ steps.lcov.outputs.coverage }}
        THRESHOLD: ${{ inputs.coverage_threshold }}
        CHECK_REGRESSION: ${{ inputs.fail_on_coverage_regression }}
      run: |
        echo "═══════════════════════════════════════════════════"
        echo "  Coverage Report"
        echo "═══════════════════════════════════════════════════"
        echo "  Current coverage : ${CURRENT}%"
        echo "  Minimum threshold: ${THRESHOLD}%"

        FAILED=false

        # --- Threshold check ---
        if [ "$THRESHOLD" != "0" ]; then
          if (( $(echo "${CURRENT} < ${THRESHOLD}" | bc -l) )); then
            echo "  ❌ FAIL: Coverage ${CURRENT}% is below threshold ${THRESHOLD}%"
            FAILED=true
          else
            echo "  ✅ PASS: Coverage is above threshold"
          fi
        fi

        # --- Regression check (allow up to 2% drop) ---
        if [ "$CHECK_REGRESSION" = "true" ] && [ -f .coverage-baseline ]; then
          PREVIOUS=$(cat .coverage-baseline)
          echo "  Previous coverage: ${PREVIOUS}%"
          ALLOWED_DROP="2.0"
          LIMIT=$(echo "${PREVIOUS} - ${ALLOWED_DROP}" | bc -l)
          if (( $(echo "${CURRENT} < ${LIMIT}" | bc -l) )); then
            DELTA=$(echo "${PREVIOUS} - ${CURRENT}" | bc -l)
            echo "  ❌ FAIL: Coverage dropped by ${DELTA}% (${PREVIOUS}% → ${CURRENT}%), exceeds ${ALLOWED_DROP}% tolerance"
            FAILED=true
          else
            if (( $(echo "${CURRENT} < ${PREVIOUS}" | bc -l) )); then
              DELTA=$(echo "${PREVIOUS} - ${CURRENT}" | bc -l)
              echo "  ⚠️  WARN: Coverage dropped by ${DELTA}% (within ${ALLOWED_DROP}% tolerance)"
            else
              echo "  ✅ PASS: Coverage did not regress"
            fi
          fi
        fi

        echo "═══════════════════════════════════════════════════"

        # Update baseline for next run
        echo "${CURRENT}" > .coverage-baseline

        if [ "$FAILED" = "true" ]; then
          exit 1
        fi

    - name: Save coverage baseline
      if: matrix.os == 'ubuntu-24.04' && inputs.fail_on_coverage_regression && always()
      uses: actions/cache/save@v5
      with:
        path: .coverage-baseline
        key: coverage-baseline-v2-${{ github.ref_name }}-${{ github.run_id }}

    - name: Upload coverage report artifact
      if: matrix.os == 'ubuntu-24.04' && inputs.with_code_coverage
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          coverage_filtered.info
        retention-days: 30
