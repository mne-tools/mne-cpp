name: Coverity
on:
  schedule:
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  COVERITY_SCAN_REF: staging

jobs:
  ScanLinux:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone staging branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.COVERITY_SCAN_REF }}
          fetch-depth: 0
      - name: Install Python 3.10 version
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          architecture: 'x64'
      - name: Install system dependencies
        run: |
          # Drop the Microsoft/Azure apt sources that occasionally 401 on
          # ubuntu-24.04 runners; they are not needed here.
          sudo rm -f /etc/apt/sources.list.d/microsoft-*.list \
                     /etc/apt/sources.list.d/azure-*.list \
                     /etc/apt/sources.list.d/microsoft-*.sources \
                     /etc/apt/sources.list.d/azure-*.sources
          sudo apt-get update -q
          # libgl1-mesa-dev is required for Qt6's Gui module to be detected
          # by find_package; libvulkan-dev mirrors the regular Linux build.
          sudo apt-get install -q -y \
            build-essential \
            ninja-build \
            libgl1-mesa-dev \
            libvulkan-dev
      - name: Download Qt toolchain
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/ci/download_toolchain.sh \
            --kind qt \
            --version "6.11.0" \
            --linkage dynamic \
            --output-dir "$RUNNER_TEMP/qt"
      - name: Download Eigen package
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/ci/download_toolchain.sh \
            --kind eigen \
            --version "5.0.1" \
            --output-dir "$GITHUB_WORKSPACE/src/external/eigen"
      - name: Coverity scan
        run: |
          ./scripts/test/coverity_scan.sh "$COVTOKEN"
        env:
          COVTOKEN: ${{ secrets.COVERITY_TOKEN }}

