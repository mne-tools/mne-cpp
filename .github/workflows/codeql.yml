name: "CodeQL"

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]
  schedule:
    - cron: '28 15 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install OpenGL development libraries
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q libgl1-mesa-dev

    - name: Download Qt toolchain
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind qt \
          --version "6.11.0" \
          --linkage dynamic \
          --output-dir "$RUNNER_TEMP/qt"

    - name: Download Eigen package
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind eigen \
          --version "5.0.1" \
          --output-dir "$GITHUB_WORKSPACE/src/external/eigen"

    # Initialize CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.
        
        # Details on CodeQL's query packs refer to : https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    # Build MNE-CPP
    - name: Configure and compile MNE-CPP
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
