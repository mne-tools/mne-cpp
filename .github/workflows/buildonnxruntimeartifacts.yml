name: BuildOnnxRuntimeArtifacts

on:
  workflow_dispatch:
  push:
    branches:
    # Change this to the branch name which you are developing on to trigger the workflow
    - generateonnxruntime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ONNXRUNTIME_VERSION: '1.21.0'
  ONNXRUNTIME_VERSION_TOKEN: '1210'
  ONNXRUNTIME_ARTIFACT_RELEASE_TAG: onnxruntime_artifacts
  TOOLCHAIN_RELEASE_TITLE: ONNX Runtime Artifacts
  TOOLCHAIN_RELEASE_NOTES: Reusable ONNX Runtime shared library packages for CI and local development.

jobs:
  RepackageLinux:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Download official ONNX Runtime release (linux-x64)
      run: |
        curl --fail --location --silent --show-error \
          --output onnxruntime-linux-x64.tgz \
          "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}.tgz"

    - name: Verify checksum and extract
      run: |
        mkdir onnxruntime-extracted
        tar xzf onnxruntime-linux-x64.tgz -C onnxruntime-extracted --strip-components=1
        # Verify the expected files are present
        test -f onnxruntime-extracted/include/onnxruntime_cxx_api.h
        test -f onnxruntime-extracted/lib/libonnxruntime.so

    - name: Repackage in MNE-CPP naming convention
      run: |
        tar cfvz "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_linux.tar.gz" -C onnxruntime-extracted .

    - uses: actions/upload-artifact@v7
      with:
        name: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_linux.tar.gz
        path: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_linux.tar.gz

    - name: Create dependency release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}"
        gh release upload "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}" "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_linux.tar.gz" --clobber

  RepackageMacOS:
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            ort_arch: arm64
          - arch: x86_64
            ort_arch: x86_64

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Download official ONNX Runtime release (macos-${{ matrix.arch }})
      run: |
        curl --fail --location --silent --show-error \
          --output onnxruntime-osx.tgz \
          "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-osx-${{ matrix.ort_arch }}-${{ env.ONNXRUNTIME_VERSION }}.tgz"

    - name: Verify and extract
      run: |
        mkdir onnxruntime-extracted
        tar xzf onnxruntime-osx.tgz -C onnxruntime-extracted --strip-components=1
        test -f onnxruntime-extracted/include/onnxruntime_cxx_api.h
        test -f onnxruntime-extracted/lib/libonnxruntime.dylib

    - name: Repackage in MNE-CPP naming convention
      run: |
        tar cfvz "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_macos_${{ matrix.arch }}.tar.gz" -C onnxruntime-extracted .

    - uses: actions/upload-artifact@v7
      with:
        name: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_macos_${{ matrix.arch }}.tar.gz
        path: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_macos_${{ matrix.arch }}.tar.gz

    - name: Create dependency release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}"
        gh release upload "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}" "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_macos_${{ matrix.arch }}.tar.gz" --clobber

  RepackageWindows:
    runs-on: windows-2025

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Download official ONNX Runtime release (win-x64)
      shell: bash
      run: |
        curl --fail --location --silent --show-error \
          --output onnxruntime-win-x64.zip \
          "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-win-x64-${{ env.ONNXRUNTIME_VERSION }}.zip"

    - name: Verify and extract
      shell: bash
      run: |
        mkdir onnxruntime-extracted
        # Windows zip has a top-level directory; use a temp dir + move contents.
        unzip -q onnxruntime-win-x64.zip -d onnxruntime-temp
        mv onnxruntime-temp/onnxruntime-win-x64-${{ env.ONNXRUNTIME_VERSION }}/* onnxruntime-extracted/
        test -f onnxruntime-extracted/include/onnxruntime_cxx_api.h
        test -f onnxruntime-extracted/lib/onnxruntime.lib

    - name: Repackage in MNE-CPP naming convention
      shell: pwsh
      run: |
        Compress-Archive -Path "onnxruntime-extracted\*" -DestinationPath "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_windows.zip"

    - uses: actions/upload-artifact@v7
      with:
        name: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_windows.zip
        path: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_windows.zip

    - name: Create dependency release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}"
        gh release upload "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}" "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_windows.zip" --clobber

  BuildWasm:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential ninja-build

    - name: Setup Emscripten SDK
      run: |
        git clone https://github.com/emscripten-core/emsdk.git ../emsdk
        cd ../emsdk
        ./emsdk install 4.0.7
        ./emsdk activate 4.0.7

    - name: Clone ONNX Runtime source
      run: |
        git clone --depth 1 --branch v${{ env.ONNXRUNTIME_VERSION }} \
          --recurse-submodules --shallow-submodules \
          https://github.com/microsoft/onnxruntime.git ../onnxruntime

    - name: Build ONNX Runtime static library for WASM
      run: |
        source ../emsdk/emsdk_env.sh
        cd ../onnxruntime

        # Pre-download Eigen to avoid FetchContent failures (GitLab
        # blocks downloads from GitHub Actions runners).
        # ORT 1.21.0 needs Eigen commit 1d8b82b0740839c0de7f1242a3585e3390ff5f33
        EIGEN_COMMIT="1d8b82b0740839c0de7f1242a3585e3390ff5f33"
        EIGEN_DIR="$(pwd)/build/_deps/eigen-src"
        mkdir -p "${EIGEN_DIR}"
        for url in \
          "https://github.com/eigenteam/eigen-git-mirror/archive/${EIGEN_COMMIT}.tar.gz" \
          "https://gitlab.com/libeigen/eigen/-/archive/${EIGEN_COMMIT}/eigen-${EIGEN_COMMIT}.tar.gz"; do
          if curl --fail --location --silent --show-error --retry 3 --retry-delay 5 \
               -o /tmp/eigen.tar.gz "${url}"; then
            echo "Downloaded Eigen from ${url}"
            break
          fi
        done
        tar xzf /tmp/eigen.tar.gz -C "${EIGEN_DIR}" --strip-components=1

        # Patch MLAS compute.cpp: guard FP16 template code that uses
        # MLFloat16::Negate/IsNegative/FromBits — these methods are
        # unavailable in the Emscripten/WASM build configuration and
        # FP16 hardware acceleration is not available on WASM anyway.
        python3 -c "
import pathlib, sys

path = pathlib.Path('onnxruntime/core/mlas/lib/compute.cpp')
lines = path.read_text().splitlines(True)

# Functions/instantiations to guard — identified by unique substring in function name line.
# Each entry: (identifying_substring, exclude_substring_or_None, is_function_def)
targets = [
    ('MlasComputeExp<MLAS_FP16>(', None, True),
    ('MlasComputeSoftmaxThreaded<MLAS_FP16>(', None, True),
    ('MlasComputeSoftmax<MLAS_FP16>(', 'Threaded', False),  # explicit instantiation (;)
    ('MlasGQASupported<MLAS_FP16>(', None, True),
]

# Collect (start, end) line ranges to guard (0-indexed, inclusive)
ranges = []
for needle, exclude, is_func in targets:
    for i, line in enumerate(lines):
        if needle not in line:
            continue
        if exclude and exclude in line:
            continue
        # Walk backward up to 10 lines to find the 'template' keyword
        start = i
        for j in range(i, max(i - 10, -1), -1):
            if lines[j].lstrip().startswith('template'):
                start = j
                break
        if is_func:
            # Find matching closing brace
            depth = 0
            end = i
            opened = False
            for k in range(i, len(lines)):
                for ch in lines[k]:
                    if ch == '{':
                        depth += 1
                        opened = True
                    elif ch == '}':
                        depth -= 1
                if opened and depth == 0:
                    end = k
                    break
        else:
            # Explicit template instantiation — find the terminating semicolon
            end = i
            for k in range(i, len(lines)):
                if ';' in lines[k]:
                    end = k
                    break
        ranges.append((start, end))
        break  # only first match per target

if not ranges:
    print('ERROR: no MLAS_FP16 blocks found to guard', file=sys.stderr)
    sys.exit(1)

# Insert guards in reverse order so indices remain valid
for start, end in sorted(ranges, reverse=True):
    lines.insert(end + 1, '#endif  // !defined(__EMSCRIPTEN__)\n')
    lines.insert(start, '#if !defined(__EMSCRIPTEN__)\n')

path.write_text(''.join(lines))
print(f'Patched {path}: guarded {len(ranges)} FP16 blocks for WASM')
"

        # Retry up to 3 times to handle other transient failures
        for attempt in 1 2 3; do
          echo "Build attempt ${attempt}/3..."
          if ./build.sh \
            --build_wasm_static_lib \
            --skip_tests \
            --disable_wasm_exception_catching \
            --disable_rtti \
            --parallel \
            --config Release \
            --cmake_extra_defines onnxruntime_BUILD_UNIT_TESTS=OFF \
              FETCHCONTENT_SOURCE_DIR_EIGEN="${EIGEN_DIR}"; then
            echo "Build succeeded on attempt ${attempt}"
            exit 0
          fi
          echo "Build attempt ${attempt} failed, retrying..."
          rm -rf build/Linux
          sleep 10
        done
        echo "All build attempts failed"
        exit 1

    - name: Package WASM static library
      run: |
        mkdir -p onnxruntime-wasm/include onnxruntime-wasm/lib
        # Copy headers from source
        cp ../onnxruntime/include/onnxruntime/core/session/*.h onnxruntime-wasm/include/
        # Copy the static library from the build output
        find ../onnxruntime/build -name 'libonnxruntime.a' -o -name 'onnxruntime.a' | head -1 | xargs -I{} cp {} onnxruntime-wasm/lib/
        # Also copy any additional static libs that may be needed
        find ../onnxruntime/build -name 'libonnxruntime_common.a' | head -1 | xargs -I{} cp {} onnxruntime-wasm/lib/ 2>/dev/null || true
        find ../onnxruntime/build -name 'libonnxruntime_session.a' | head -1 | xargs -I{} cp {} onnxruntime-wasm/lib/ 2>/dev/null || true
        # Verify
        test -f onnxruntime-wasm/include/onnxruntime_cxx_api.h
        ls -la onnxruntime-wasm/lib/
        tar cfvz "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_wasm.tar.gz" -C onnxruntime-wasm .

    - uses: actions/upload-artifact@v7
      with:
        name: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_wasm.tar.gz
        path: onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_wasm.tar.gz

    - name: Create dependency release and upload
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        bash ./scripts/ci/ensure_toolchain_release.sh "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}"
        gh release upload "${{ env.ONNXRUNTIME_ARTIFACT_RELEASE_TAG }}" "onnxruntime_${{ env.ONNXRUNTIME_VERSION_TOKEN }}_wasm.tar.gz" --clobber
