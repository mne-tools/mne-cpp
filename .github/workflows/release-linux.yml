name: Release Linux

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  LinuxDynamic:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Determine release info
      id: release-info
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-latest" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
          echo "tag=dev_build" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-dev" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=none" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-local" >> "$GITHUB_OUTPUT"
          echo "should_upload=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Install system dependencies
      run: |
        # Remove third-party repos that can cause transient 403/signing errors
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q libgl1-mesa-dev
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Download Qt toolchain
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind qt \
          --version "6.11.0" \
          --linkage dynamic \
          --output-dir "$RUNNER_TEMP/qt"
    - name: Download Eigen package
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind eigen \
          --version "5.0.1" \
          --output-dir "$GITHUB_WORKSPACE/src/external/eigen"
    - name: Configure and compile MNE-CPP
      run: |
        ./scripts/build_project.sh
    - name: Deploy binaries
      run: |
        echo "Qt environment:"
        echo "  QT_ROOT_DIR=${QT_ROOT_DIR:-<not set>}"
        echo "  Qt6_DIR=${Qt6_DIR:-<not set>}"
        echo "  Qt lib dir contents:"
        QT_PREFIX="${QT_ROOT_DIR:-}"
        if [ -z "$QT_PREFIX" ] && [ -n "${Qt6_DIR}" ]; then
          QT_PREFIX="$(cd "${Qt6_DIR}/../../.." 2>/dev/null && pwd)"
        fi
        ls "$QT_PREFIX/lib"/libQt6*.so* 2>/dev/null | head -5 || echo "  No Qt .so files found at $QT_PREFIX/lib"
        ./scripts/deploy.bat dynamic pack
    - name: Upload release binaries
      if: steps.release-info.outputs.should_upload == 'true'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-linux-dynamic-x86_64.tar.gz "${{ steps.release-info.outputs.prefix }}-linux-dynamic-x86_64.tar.gz"
        gh release upload "${{ steps.release-info.outputs.tag }}" "${{ steps.release-info.outputs.prefix }}-linux-dynamic-x86_64.tar.gz" --clobber


  LinuxStatic:
    runs-on: ubuntu-24.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Determine release info
      id: release-info
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-latest" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
          echo "tag=dev_build" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-dev" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=none" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-local" >> "$GITHUB_OUTPUT"
          echo "should_upload=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
    - name: Install dependencies
      run: |
        # Remove third-party repos that can cause transient 403/signing errors
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q build-essential libgl1-mesa-dev libvulkan-dev ninja-build
    - name: Download Eigen package
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind eigen \
          --version "5.0.1" \
          --output-dir "$GITHUB_WORKSPACE/src/external/eigen"
    - name: Cache static Qt binaries
      id: cache-qt-static
      uses: actions/cache@v5
      with:
        path: Qt6_static
        key: qt-6.11.0-static-linux-x86_64
    - name: Download pre-built static Qt
      id: download-qt-static
      if: steps.cache-qt-static.outputs.cache-hit != 'true'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download qt_binaries -p "qt6_6110_static_binaries_linux.tar.gz" -D /tmp
        mkdir -p Qt6_static
        tar xfz /tmp/qt6_6110_static_binaries_linux.tar.gz -C Qt6_static
    - name: Build static Qt from source
      if: steps.cache-qt-static.outputs.cache-hit != 'true' && steps.download-qt-static.outcome != 'success'
      run: |
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        cd qt5
        ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools
        cd ..
        mkdir qt6_shadow
        cd qt6_shadow
        ../qt5/configure -static -release -prefix "$GITHUB_WORKSPACE/Qt6_static" -skip webengine -nomake tests -nomake examples -no-dbus -no-ssl -no-pch -opensource -confirm-license -qt-libpng -qt-pcre -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(nproc)
        cmake --install .
    - name: Configure and compile MNE-CPP (static)
      run: |
        export CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/Qt6_static
        ./scripts/build_project.sh static
    - name: Deploy binaries
      run: |
        ./scripts/deploy.bat static pack
    - name: Upload release binaries
      if: steps.release-info.outputs.should_upload == 'true'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-linux-static-x86_64.tar.gz "${{ steps.release-info.outputs.prefix }}-linux-static-x86_64.tar.gz"
        gh release upload "${{ steps.release-info.outputs.tag }}" "${{ steps.release-info.outputs.prefix }}-linux-static-x86_64.tar.gz" --clobber
