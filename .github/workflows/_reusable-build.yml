# ---------------------------------------------------------------------------
# Reusable workflow: Build MNE-CPP (no tests, min/max Qt versions)
# Called by main.yml, staging.yml, and pull-request.yml
# ---------------------------------------------------------------------------
name: Reusable Build

on:
  workflow_call:
    inputs:
      qt_version:
        description: "Qt version to build with"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  Build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-24.04, macos-26, windows-2025]

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-24.04'
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-*.list /etc/apt/sources.list.d/azure-*.list /etc/apt/sources.list.d/microsoft-*.sources /etc/apt/sources.list.d/azure-*.sources
        sudo apt-get update -q
        sudo apt-get install -q libgl1-mesa-dev

    - name: Download Qt toolchain (Linux|MacOS)
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'macos-26'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind qt \
          --version "${{ inputs.qt_version }}" \
          --linkage dynamic \
          --output-dir "$RUNNER_TEMP/qt"

    - name: Download Eigen package (Linux|MacOS)
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'macos-26'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        ./scripts/ci/download_toolchain.sh \
          --kind eigen \
          --version "5.0.1" \
          --output-dir "$GITHUB_WORKSPACE/src/external/eigen"

    - name: Download Qt toolchain (Windows)
      if: matrix.os == 'windows-2025'
      shell: cmd
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        call scripts\ci\download_toolchain.bat --kind qt --version "${{ inputs.qt_version }}" --linkage dynamic --output-dir "%RUNNER_TEMP%\qt"

    - name: Download Eigen package (Windows)
      if: matrix.os == 'windows-2025'
      shell: cmd
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        call scripts\ci\download_toolchain.bat --kind eigen --version "5.0.1" --output-dir "%GITHUB_WORKSPACE%\src\external\eigen"

    - name: Configure and compile MNE-CPP (Linux|MacOS)
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'macos-26'
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Configure and compile MNE-CPP (Windows)
      if: matrix.os == 'windows-2025'
      run: |
        cmd.exe /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"
        Get-Content "$env:temp\vcvars.txt" | Foreach-Object { if ($_ -match "^(.*?)=(.*)$") { Set-Content "env:\$($matches[1])" $matches[2] } }
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Deploy binaries
      run: |
        ./scripts/deploy.bat dynamic pack
