name: Release macOS

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  MacOSDynamic:
    runs-on: macos-26

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Determine release info
      id: release-info
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-latest" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
          echo "tag=dev_build" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-dev" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=none" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-local" >> "$GITHUB_OUTPUT"
          echo "should_upload=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'arm64'
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.11.0
        modules: qtshadertools
    - name: Configure and compile MNE-CPP
      run: |
        ./scripts/build_project.bat
    - name: Free up disk space before packaging
      run: |
        echo "Disk usage before cleanup:" && df -h
        # Remove large unused toolchains BUT preserve Qt (/opt/hostedtoolcache/Qt)
        sudo rm -rf /usr/local/share/gtk-doc /usr/local/Cellar /usr/local/lib/node_modules /usr/share/dotnet /Users/runner/Library/Caches/*
        # Selectively clean hostedtoolcache without deleting Qt
        find /opt/hostedtoolcache -mindepth 1 -maxdepth 1 ! -name 'Qt' -exec sudo rm -rf {} + 2>/dev/null || true
        echo "Disk usage after cleanup:" && df -h
    - name: Deploy binaries (MacOS)
      run: |
        echo "Qt environment:"
        echo "  QT_ROOT_DIR=${QT_ROOT_DIR:-<not set>}"
        echo "  Qt6_DIR=${Qt6_DIR:-<not set>}"
        which macdeployqt || echo "WARNING: macdeployqt not on PATH"
        ./scripts/deploy.bat dynamic pack
        # Verify archive contains Qt frameworks
        echo ""
        echo "=== Archive verification ==="
        ARCHIVE_SIZE=$(stat -f%z mne-cpp-macos-dynamic-arm64.tar.gz 2>/dev/null || echo 0)
        echo "Archive size: $((ARCHIVE_SIZE / 1048576)) MB"
        if [ "$ARCHIVE_SIZE" -lt 50000000 ]; then
          echo "ERROR: Archive is too small ($((ARCHIVE_SIZE / 1048576)) MB). Qt frameworks likely missing."
          echo "Archive contents:"
          tar tzf mne-cpp-macos-dynamic-arm64.tar.gz | head -60
          exit 1
        fi
        QT_FW_COUNT=$(tar tzf mne-cpp-macos-dynamic-arm64.tar.gz | grep -c 'Qt.*\.framework' || true)
        echo "Qt framework entries in archive: ${QT_FW_COUNT}"
        if [ "${QT_FW_COUNT}" -lt 10 ]; then
          echo "WARNING: Very few Qt framework entries found. Deployment may be incomplete."
        fi
    - name: Upload release binaries
      if: steps.release-info.outputs.should_upload == 'true'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-macos-dynamic-arm64.tar.gz "${{ steps.release-info.outputs.prefix }}-macos-dynamic-arm64.tar.gz"
        gh release upload "${{ steps.release-info.outputs.tag }}" "${{ steps.release-info.outputs.prefix }}-macos-dynamic-arm64.tar.gz" --clobber


  MacOSStatic:
    runs-on: macos-26

    steps:
    - name: Clone repository
      uses: actions/checkout@v5

    - name: Determine release info
      id: release-info
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-latest" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
          echo "tag=dev_build" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-dev" >> "$GITHUB_OUTPUT"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=none" >> "$GITHUB_OUTPUT"
          echo "prefix=mne-cpp-local" >> "$GITHUB_OUTPUT"
          echo "should_upload=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Install Python 3.10 version
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'arm64'
    - name: Install dependencies
      run: |
        brew list ninja >/dev/null 2>&1 || brew install ninja
    - name: Cache static Qt binaries
      id: cache-qt-static
      uses: actions/cache@v5
      with:
        path: Qt6_static
        key: qt-6.11.0-static-macos-arm64
    - name: Download pre-built static Qt
      id: download-qt-static
      if: steps.cache-qt-static.outputs.cache-hit != 'true'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download qt_binaries -p "qt6_6110_static_binaries_macos.tar.gz" -D /tmp
        mkdir -p Qt6_static
        tar xfz /tmp/qt6_6110_static_binaries_macos.tar.gz -C Qt6_static
    - name: Build static Qt from source
      if: steps.cache-qt-static.outputs.cache-hit != 'true' && steps.download-qt-static.outcome != 'success'
      run: |
        cd ..
        git clone https://code.qt.io/qt/qt5.git -b v6.11.0
        cd qt5
        ./init-repository -f --module-subset=qtbase,qtsvg,qtshadertools
        cd ..
        mkdir qt6_shadow
        cd qt6_shadow
        ../qt5/configure -static -release -prefix "$GITHUB_WORKSPACE/Qt6_static" -skip webengine -nomake tools -nomake tests -nomake examples -no-dbus -no-ssl -no-pch -opensource -confirm-license -- -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel $(sysctl -n hw.ncpu)
        cmake --install .
    - name: Configure and compile MNE-CPP (static)
      run: |
        export CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/Qt6_static
        ./scripts/build_project.bat static
    - name: Deploy binaries (MacOS)
      run: |
        ./scripts/deploy.bat static pack
    - name: Upload release binaries
      if: steps.release-info.outputs.should_upload == 'true'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        cp mne-cpp-macos-static-arm64.tar.gz "${{ steps.release-info.outputs.prefix }}-macos-static-arm64.tar.gz"
        gh release upload "${{ steps.release-info.outputs.tag }}" "${{ steps.release-info.outputs.prefix }}-macos-static-arm64.tar.gz" --clobber
