name: API Registry Validation

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
      - main

concurrency:
  group: api-registry-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-api-registry:
    runs-on: ubuntu-latest
    name: Validate API Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run API registry validator
        run: |
          python3 tools/validate_api_registry.py \
            --repo-root "${{ github.workspace }}"
