<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNE-CPP | MNE Inspect</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(175deg, #f8f9fc 0%, #eef0f6 50%, #f4f5fa 100%);
        }

        /* ── Loading overlay ─────────────────────────────────── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ── Particle canvas ─────────────────────────────────── */
        #particles-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Glass card ──────────────────────────────────────── */
        .loading-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px;
            padding: 52px 64px 44px;
            text-align: center;
            box-shadow:
                0 2px 4px rgba(108, 92, 231, 0.03),
                0 8px 16px rgba(108, 92, 231, 0.06),
                0 20px 40px rgba(0, 0, 0, 0.07),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            max-width: 460px;
            width: 90%;
            will-change: transform;
            transition: transform 0.15s ease-out;
        }

        /* ── Logo ────────────────────────────────────────────── */
        .logo-container {
            margin-bottom: 28px;
        }

        .logo-container svg {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 3px 12px rgba(0, 0, 0, 0.08));
        }

        /* ── Typography ──────────────────────────────────────── */
        .app-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #2d3436;
            letter-spacing: -0.025em;
            margin-bottom: 6px;
        }

        .app-subtitle {
            font-size: 0.82rem;
            color: #636e72;
            margin-bottom: 32px;
        }

        /* ── Progress bar ────────────────────────────────────── */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe, #6c5ce7);
            background-size: 200% 100%;
            border-radius: 2px;
            animation: shimmer 1.8s ease-in-out infinite;
            transition: width 0.4s ease;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ── Status ──────────────────────────────────────────── */
        .status-text {
            font-size: 0.78rem;
            color: #b2bec3;
            min-height: 1.3em;
            transition: color 0.3s;
        }

        /* ── Qt screen container ────────────────────────── */
        #screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #screen.visible {
            z-index: 200;
        }

        #qtspinner,
        #qtstatus {
            display: none !important;
        }
    </style>
</head>

    <script>
        /* ================================================================
           Floating-polygon particle system — mouse-reactive parallax
           ================================================================ */
        try { (function () {
            var canvas = document.getElementById('particles-canvas');
            var ctx = canvas.getContext('2d');
            var W, H;
            var mouseX, mouseY, targetX, targetY;
            var particles = [];
            var running = true;

            var PALETTE = [
                '#6c5ce7', '#a29bfe', '#0c9a49', '#7bc24e', '#96c93f',
                '#199eda', '#2fb7e4', '#e76daa', '#df1284', '#aa1e53',
                '#fbda20', '#fae250', '#daab28', '#d81e3a', '#2465b0',
                '#033045', '#986036', '#c3a593'
            ];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                mouseX = targetX = W / 2;
                mouseY = targetY = H / 2;
            }

            /* — Particle class — */
            function Particle() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.r = Math.random() * 7 + 2;
                this.baseR = this.r;
                this.vx = (Math.random() - 0.5) * 0.35;
                this.vy = (Math.random() - 0.5) * 0.35;
                this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
                this.alpha = Math.random() * 0.25 + 0.08;
                this.baseA = this.alpha;
                this.rot = Math.random() * Math.PI * 2;
                this.rotV = (Math.random() - 0.5) * 0.015;
                this.depth = Math.random() * 0.7 + 0.3;
                /* Only pluses and triangles (MNE-CPP logo shapes) */
                this.shape = Math.random() < 0.5 ? 'plus' : 'triangle';
                /* Pre-compute irregular triangle verts (like logo facets) */
                if (this.shape === 'triangle') {
                    this.tri = [];
                    var angle0 = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
                    for (var j = 0; j < 3; j++) {
                        var a = angle0 + (j / 3) * Math.PI * 2;
                        var stretch = 0.6 + Math.random() * 0.8;
                        this.tri.push({ dx: Math.cos(a) * stretch, dy: Math.sin(a) * stretch });
                    }
                }
            }

            Particle.prototype.update = function () {
                /* parallax drift from mouse */
                var dx = (mouseX - W / 2) * this.depth * 0.00015;
                var dy = (mouseY - H / 2) * this.depth * 0.00015;
                this.x += this.vx + dx;
                this.y += this.vy + dy;
                this.rot += this.rotV;

                /* proximity glow */
                var mx = mouseX - this.x, my = mouseY - this.y;
                var dist = Math.sqrt(mx * mx + my * my);
                if (dist < 220) {
                    var t = 1 - dist / 220;
                    this.alpha = Math.min(0.55, this.baseA + t * 0.4);
                    this.r = Math.min(this.baseR + t * 6, 16);
                } else {
                    this.alpha += (this.baseA - this.alpha) * 0.04;
                    this.r += (this.baseR - this.r) * 0.04;
                }

                /* wrap */
                if (this.x < -30) this.x = W + 30;
                if (this.x > W + 30) this.x = -30;
                if (this.y < -30) this.y = H + 30;
                if (this.y > H + 30) this.y = -30;
            };

            Particle.prototype.draw = function () {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot);
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                if (this.shape === 'plus') {
                    /* Rectangular cross matching MNE-CPP logo proportions:
                       arm thickness ≈ 26% of arm length (from logo SVG paths) */
                    var arm = this.r;
                    var t = arm * 0.26;
                    ctx.beginPath();
                    ctx.moveTo(-t, -arm); ctx.lineTo(t, -arm);
                    ctx.lineTo(t, -t);    ctx.lineTo(arm, -t);
                    ctx.lineTo(arm, t);   ctx.lineTo(t, t);
                    ctx.lineTo(t, arm);   ctx.lineTo(-t, arm);
                    ctx.lineTo(-t, t);    ctx.lineTo(-arm, t);
                    ctx.lineTo(-arm, -t); ctx.lineTo(-t, -t);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    /* Irregular scalene triangle — like the logo's faceted polygons */
                    var tri = this.tri;
                    ctx.beginPath();
                    ctx.moveTo(tri[0].dx * this.r, tri[0].dy * this.r);
                    ctx.lineTo(tri[1].dx * this.r, tri[1].dy * this.r);
                    ctx.lineTo(tri[2].dx * this.r, tri[2].dy * this.r);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            };

            /* — Init — */
            resize();
            var count = Math.min(90, Math.floor(W * H / 12000));
            for (var i = 0; i < count; i++) particles.push(new Particle());

            /* smooth mouse */
            document.addEventListener('mousemove', function (e) { targetX = e.clientX; targetY = e.clientY; });
            document.addEventListener('touchmove', function (e) { targetX = e.touches[0].clientX; targetY = e.touches[0].clientY; }, { passive: true });
            window.addEventListener('resize', resize);

            /* — Card tilt — */
            var card = document.getElementById('loading-card');
            document.addEventListener('mousemove', function (e) {
                if (!card || !running) return;
                var r = card.getBoundingClientRect();
                var cx = e.clientX - r.left - r.width / 2;
                var cy = e.clientY - r.top - r.height / 2;
                var tiltX = (cy / r.height) * 4;
                var tiltY = -(cx / r.width) * 4;
                card.style.transform = 'perspective(800px) rotateX(' + tiltX + 'deg) rotateY(' + tiltY + 'deg)';
            });
            document.addEventListener('mouseleave', function () {
                if (card) card.style.transform = '';
            });

            /* — Render loop — */
            function frame() {
                if (!running) return;
                mouseX += (targetX - mouseX) * 0.07;
                mouseY += (targetY - mouseY) * 0.07;
                ctx.clearRect(0, 0, W, H);
                for (var i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                requestAnimationFrame(frame);
            }
            frame();

            /* expose stop for cleanup */
            window._stopParticles = function () { running = false; };
        })(); } catch(e) { console.warn('Particle system error:', e); }
    </script>
    <script>
        /* ================================================================
           Progress bar — simulated advance until Qt takes over
           ================================================================ */
        var progressBar = document.getElementById('progress-bar');
        var statusText = document.getElementById('status-text');
        var simProg = 0;

        function setProgress(v, msg) {
            simProg = Math.min(v, 100);
            progressBar.style.width = simProg + '%';
            if (msg) statusText.textContent = msg;
        }

        var simTimer = setInterval(function () {
            if (simProg < 25) { simProg += Math.random() * 3; setProgress(simProg, 'Downloading application\u2026'); }
            else if (simProg < 55) { simProg += Math.random() * 1.5; setProgress(simProg, 'Compiling WebAssembly\u2026'); }
            else if (simProg < 80) { simProg += Math.random() * 0.6; setProgress(simProg, 'Initializing Qt framework\u2026'); }
        }, 250);

        /* ================================================================
           Qt WASM bootstrap
           ================================================================ */
        async function init() {
            var screen = document.getElementById('screen');

            function showApp() {
                clearInterval(simTimer);
                setProgress(100, 'Ready!');
                setTimeout(function () {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('particles-canvas').style.display = 'none';
                    screen.classList.add('visible');
                    if (window._stopParticles) window._stopParticles();
                }, 500);
            }

            if (typeof qtLoad !== 'function') {
                clearInterval(simTimer);
                setProgress(0, 'Error: mne_inspect.js failed to load');
                statusText.style.color = '#d63031';
                return;
            }

            try {
                var instance = await qtLoad({
                    qt: {
                        onLoaded: function () { showApp(); },
                        onExit: function (exitData) {
                            if (exitData.code !== undefined) {
                                clearInterval(simTimer);
                                statusText.textContent = exitData.text || 'Application exited (code ' + exitData.code + ')';
                                statusText.style.color = '#d63031';
                            }
                        },
                        entryFunction: window.mne_inspect_entry,
                        containerElements: [screen],
                    }
                });
                /* If onLoaded was not called but qtLoad resolved, show the app */
                if (instance && !screen.classList.contains('visible')) {
                    showApp();
                }
            } catch (e) {
                clearInterval(simTimer);
                setProgress(simProg, 'Failed to load: ' + e.message);
                statusText.style.color = '#d63031';
            }
        }
    </script>
    <script src="mne_inspect.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
</body>
