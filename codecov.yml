codecov:
  require_ci_to_pass: yes
  branch: main
  branches:
    - main
    - staging

coverage:
  precision: 2
  round: down
  range: 0..100
  status:
    patch:
      default:
        target: auto
        threshold: 2%
    changes: no
    project:
      default:
        target: auto
        threshold: 2%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no

# Coverage is filtered to src/libraries, src/applications, src/tools by
# fastcov before upload.  Files outside those directories are excluded from
# the coverage_filtered.info report uploaded by the CI workflow.
ignore:
  - "src/testframes/**"
  - "src/external/**"
