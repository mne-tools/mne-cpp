codecov:
  require_ci_to_pass: yes
  branch: main
  branches:
    - main
    - staging

coverage:
  precision: 2
  round: down
  range: 0..100
  status:
    patch:
      default:
        target: auto
        threshold: 2%
    changes: no
    project:
      default:
        target: auto
        threshold: 2%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no

# Track coverage for MNE-CPP libraries, applications, and tools.
# gcov instrumentation is enabled by WITH_CODE_COV in each subdirectory's
# CMakeLists.txt; this paths directive tells Codecov which source files to
# include in the coverage report.
paths:
  - "src/libraries/**"
  - "src/applications/**"
  - "src/tools/**"
