codecov:
  require_ci_to_pass: yes
  branch: main
  branches:
    - main
    - staging

coverage:
  precision: 2
  round: down
  range: 0..100
  status:
    patch:
      default:
        target: auto
        threshold: 2%
    changes: no
    project:
      default:
        target: auto
        threshold: 2%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no

# Only track coverage for the MNE-CPP libraries.
# gcov data is generated exclusively for libraries (see src/libraries/CMakeLists.txt),
# and this paths directive tells Codecov to include only library source files.
paths:
  - "src/libraries/**"
